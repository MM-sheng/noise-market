<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOISE // 纯随机市场</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0E13; --panel:#12161F; --panel2:#1A2030; --raise:#222A3B;
    --grid:rgba(120,140,170,0.08); --hair:rgba(120,140,170,0.13); --hair2:rgba(120,140,170,0.22);
    --ink:#DCE3EF; --muted:#7B879B; --dim:#525C6E;
    --long:#37D3BD; --short:#F47A5D; --signal:#EBB65C;
    --long-dim:rgba(55,211,189,.13); --short-dim:rgba(244,122,93,.13); --sig-dim:rgba(235,182,92,.12);
    --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
    --disp:'Space Grotesk',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg); color:var(--ink); font-family:var(--disp); -webkit-font-smoothing:antialiased;
    background-image:radial-gradient(1100px 520px at 78% -12%, rgba(235,182,92,.05), transparent 62%);}
  .wrap{max-width:1080px; margin:0 auto; padding:18px 16px 36px}

  header{display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; margin-bottom:14px}
  .brand{display:flex; align-items:baseline; gap:11px}
  .brand h1{font-size:20px; font-weight:700; letter-spacing:-.02em}
  .brand h1 .n{color:var(--signal)}
  .brand .sub{font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:.14em; text-transform:uppercase}
  .config{display:flex; gap:8px; flex-wrap:wrap}
  .field{display:flex; flex-direction:column; gap:3px}
  .field label{font-family:var(--mono); font-size:8.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); padding-left:2px}
  .field input{width:62px; background:var(--panel); border:1px solid var(--hair); color:var(--ink); font-family:var(--mono); font-size:12px; padding:5px 7px; border-radius:5px; outline:none}
  .field input:focus{border-color:var(--signal)}

  .board{display:grid; grid-template-columns:1fr 296px; gap:12px; align-items:start}
  .panel{background:var(--panel); border:1px solid var(--hair); border-radius:11px}
  .col{display:flex; flex-direction:column; gap:12px}

  .chartwrap{position:relative; padding:2px}
  #chart{display:block; width:100%; height:340px; border-radius:10px}
  .readout{position:absolute; top:13px; left:15px; font-family:var(--mono); pointer-events:none}
  .readout .px{font-size:25px; font-weight:700; line-height:1}
  .readout .chg{font-size:11.5px; margin-top:4px}
  .tickbadge{position:absolute; top:14px; right:15px; font-family:var(--mono); font-size:10.5px; color:var(--dim); letter-spacing:.08em; pointer-events:none; text-align:right}
  .up{color:var(--long)} .down{color:var(--short)} .flat{color:var(--muted)}
  .progress{position:absolute; left:2px; right:2px; bottom:2px; height:3px; background:var(--hair); border-radius:0 0 10px 10px; overflow:hidden}
  .progress .fill{height:100%; width:0%; background:var(--signal); transition:width .1s linear}

  .trade{padding:15px 16px}
  .bigbtns{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  button.big{font-family:var(--disp); font-weight:700; font-size:17px; letter-spacing:.01em; padding:18px 0; border-radius:9px; border:1px solid transparent; cursor:pointer; transition:transform .05s, filter .12s, box-shadow .12s; position:relative}
  button.big:active{transform:translateY(1px)}
  .blong{background:var(--long-dim); border-color:rgba(55,211,189,.45); color:var(--long)}
  .bshort{background:var(--short-dim); border-color:rgba(244,122,93,.45); color:var(--short)}
  .blong.on{box-shadow:0 0 0 1px var(--long), 0 0 22px -6px var(--long); background:rgba(55,211,189,.2)}
  .bshort.on{box-shadow:0 0 0 1px var(--short), 0 0 22px -6px var(--short); background:rgba(244,122,93,.2)}
  button.big .k{position:absolute; top:7px; right:9px; font-family:var(--mono); font-size:9px; opacity:.6; font-weight:500}
  .undertrade{display:flex; align-items:center; gap:12px; margin-top:11px}
  .flatbtn{font-family:var(--mono); font-size:11px; letter-spacing:.08em; color:var(--muted); background:transparent; border:1px solid var(--hair); padding:8px 14px; border-radius:6px; cursor:pointer}
  .flatbtn:hover{color:var(--ink); border-color:var(--muted)}
  .sizer{display:flex; align-items:center; gap:2px; margin-left:auto; font-family:var(--mono)}
  .sizer button{width:28px; height:28px; background:var(--panel2); border:1px solid var(--hair); color:var(--ink); border-radius:6px; cursor:pointer; font-size:15px; line-height:1}
  .sizer button:active{transform:translateY(1px)}
  .sizer .sz{width:40px; text-align:center; font-size:14px; font-weight:700}
  .sizer .szlab{font-size:8.5px; color:var(--dim); letter-spacing:.1em; text-transform:uppercase; margin-right:6px}

  .transport{display:flex; align-items:center; gap:14px; padding:11px 14px}
  .primary{flex:1; font-family:var(--disp); font-weight:700; font-size:14px; letter-spacing:.04em; padding:13px 0; border-radius:8px; border:1px solid var(--hair2); background:var(--panel2); color:var(--signal); cursor:pointer; text-transform:uppercase; transition:filter .12s}
  .primary:hover{filter:brightness(1.15)}
  .primary.go{background:var(--sig-dim); border-color:var(--signal); box-shadow:0 0 22px -8px var(--signal)}
  .speedbox{display:flex; align-items:center; gap:9px; font-family:var(--mono); font-size:9px; letter-spacing:.1em; color:var(--muted); text-transform:uppercase}
  .speedbox .sv{color:var(--ink); width:16px; text-align:right}
  input[type=range]{-webkit-appearance:none; appearance:none; height:3px; width:96px; background:var(--hair); border-radius:3px; outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:13px; height:13px; border-radius:50%; background:var(--signal); cursor:pointer}
  input[type=range]::-moz-range-thumb{width:13px; height:13px; border:none; border-radius:50%; background:var(--signal); cursor:pointer}

  .lead{padding:14px 15px}
  .rail-h{font-family:var(--mono); font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin-bottom:13px; display:flex; align-items:center; gap:9px}
  .rail-h::after{content:""; flex:1; height:1px; background:var(--hair)}
  .lrow{display:grid; grid-template-columns:18px 1fr; gap:9px; align-items:center; padding:6px 0}
  .lrow .medal{font-family:var(--mono); font-size:12px; text-align:center; color:var(--muted)}
  .lname{display:flex; align-items:baseline; justify-content:space-between; gap:6px; margin-bottom:4px}
  .lname .who{font-size:12.5px; font-weight:500; display:flex; align-items:center; gap:6px}
  .lname .who .g{font-size:11px; opacity:.8}
  .lname .ret{font-family:var(--mono); font-size:12px; font-weight:700}
  .bar{position:relative; height:5px; background:var(--panel2); border-radius:3px; overflow:hidden}
  .bar .mid{position:absolute; left:50%; top:0; bottom:0; width:1px; background:var(--hair2)}
  .bar .fill{position:absolute; top:0; bottom:0; border-radius:3px}
  .lrow.you .who{color:var(--signal); font-weight:700}
  .lrow.you{background:var(--sig-dim); border-radius:7px; margin:0 -6px; padding:6px}

  .estrip{padding:13px 15px}
  .eq{font-family:var(--mono); font-size:24px; font-weight:700; letter-spacing:-.01em}
  .eq .sm{font-size:13px; color:var(--muted)}
  .eqline{display:flex; justify-content:space-between; margin-top:8px; font-family:var(--mono); font-size:11.5px}
  .eqline .k{color:var(--muted)}

  /* board panel with tabs */
  .board2{padding:14px 15px}
  .tabs{display:flex; align-items:center; gap:4px; margin-bottom:12px}
  .tab{font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); padding:5px 9px; border-radius:6px; cursor:pointer; border:1px solid transparent}
  .tab.active{color:var(--signal); background:var(--sig-dim); border-color:var(--hair)}
  .tab .env{font-size:8px; margin-left:4px; opacity:.7}
  .clr{margin-left:auto; font-family:var(--mono); font-size:9.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--dim); background:none; border:none; cursor:pointer}
  .clr:hover{color:var(--muted)}
  .ssum{font-family:var(--mono); font-size:11px; color:var(--muted); margin-bottom:9px; display:flex; justify-content:space-between}
  .ssum b{color:var(--ink)}
  .slog{display:flex; flex-direction:column; gap:2px; max-height:186px; overflow-y:auto}
  .slog::-webkit-scrollbar{width:5px}
  .slog::-webkit-scrollbar-thumb{background:var(--hair2); border-radius:3px}
  .sitem{display:grid; grid-template-columns:auto 1fr auto; gap:8px; font-family:var(--mono); font-size:11px; padding:5px 0; border-bottom:1px solid var(--grid); align-items:baseline}
  .sitem .rk{font-weight:700} .sitem .r{color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .sitem.mine{background:var(--sig-dim); border-radius:6px; padding:5px 6px; margin:0 -6px}
  .sitem.mine .r{color:var(--signal)}
  .sempty{font-family:var(--mono); font-size:11px; color:var(--dim); text-align:center; padding:16px 6px; line-height:1.5}

  /* result bar */
  .resultbar{display:flex; align-items:center; gap:14px; padding:13px 16px; margin-top:12px; flex-wrap:wrap}
  .resultbar[hidden]{display:none}
  .rb-info{font-family:var(--mono); font-size:12.5px; color:var(--muted); display:flex; align-items:center; gap:10px; flex-wrap:wrap}
  .rb-info .big{font-size:15px; font-weight:700}
  .rb-actions{display:flex; align-items:center; gap:8px; margin-left:auto; flex-wrap:wrap}
  .rb-actions input{width:118px; background:var(--panel); border:1px solid var(--hair); color:var(--ink); font-family:var(--mono); font-size:12px; padding:8px 9px; border-radius:6px; outline:none}
  .rb-actions input:focus{border-color:var(--signal)}
  .abtn{font-family:var(--disp); font-weight:600; font-size:12.5px; padding:9px 14px; border-radius:7px; cursor:pointer; border:1px solid var(--hair2); background:var(--panel2); color:var(--ink); transition:filter .12s}
  .abtn:hover{filter:brightness(1.18)}
  .abtn.up{background:var(--sig-dim); border-color:var(--signal); color:var(--signal)}
  .abtn:disabled{opacity:.4; cursor:not-allowed; filter:none}
  .rb-hint{font-family:var(--mono); font-size:10px; color:var(--dim); width:100%; margin-top:-4px}

  /* verdict */
  .verdict{margin-top:12px; padding:18px 20px; position:relative; overflow:hidden}
  .verdict::before{content:""; position:absolute; inset:0; background:linear-gradient(100deg, rgba(235,182,92,.05), transparent 55%); pointer-events:none}
  .verdict h2{font-family:var(--mono); font-size:10.5px; letter-spacing:.2em; text-transform:uppercase; color:var(--signal); margin-bottom:15px; display:flex; align-items:center; gap:10px}
  .verdict h2::after{content:""; flex:1; height:1px; background:var(--hair)}
  .vgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:16px}
  .metric .lab{font-family:var(--mono); font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:6px}
  .metric .val{font-family:var(--mono); font-size:18px; font-weight:700}
  .metric .note{font-family:var(--mono); font-size:10px; color:var(--dim); margin-top:3px}
  .ruling{font-family:var(--disp); font-size:14px; line-height:1.55; color:var(--ink); border-top:1px solid var(--hair); padding-top:15px}
  .ruling b{color:var(--signal)}
  .ruling .tag{font-family:var(--mono); font-size:10.5px; letter-spacing:.09em; text-transform:uppercase; padding:2px 8px; border-radius:4px; margin-right:8px; vertical-align:1px}
  .tag.luck{background:var(--signal); color:#1a140a}
  .tag.wait{background:var(--panel2); color:var(--muted); border:1px solid var(--hair)}
  .tag.cost{background:var(--short-dim); color:var(--short)}

  /* share overlay */
  .overlay{position:fixed; inset:0; background:rgba(6,8,12,.82); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px}
  .overlay[hidden]{display:none}
  .cardmodal{background:var(--panel); border:1px solid var(--hair2); border-radius:14px; padding:16px; max-width:520px; width:100%}
  #shareCanvas{width:100%; height:auto; border-radius:9px; display:block; background:#0B0E13}
  .cm-actions{display:flex; gap:8px; margin-top:14px; flex-wrap:wrap}
  .cm-actions .abtn{flex:1; text-align:center; padding:11px 0}
  .toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%); background:var(--raise); border:1px solid var(--hair2); color:var(--ink); font-family:var(--mono); font-size:12px; padding:9px 16px; border-radius:8px; z-index:60; opacity:0; transition:opacity .2s; pointer-events:none}
  .toast.show{opacity:1}

  @media(max-width:820px){
    .board{grid-template-columns:1fr}
    #chart{height:280px}
    .vgrid{grid-template-columns:1fr 1fr}
    .rb-actions{margin-left:0}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <h1><span class="n">NOISE</span> // 纯随机市场</h1>
      <span class="sub">zero-drift · race the bots</span>
    </div>
    <div class="config">
      <div class="field"><label>Seed</label><input id="cfgSeed" value="1337"></div>
      <div class="field"><label>Vol%</label><input id="cfgSigma" value="1.0"></div>
      <div class="field"><label>Cost bp</label><input id="cfgCost" value="2"></div>
      <div class="field"><label>Ticks</label><input id="cfgLen" value="120"></div>
    </div>
  </header>

  <div class="board">
    <div class="col">
      <div class="panel chartwrap">
        <canvas id="chart"></canvas>
        <div class="readout"><div class="px" id="rPrice">100.00</div><div class="chg flat" id="rChg">+0.00%</div></div>
        <div class="tickbadge" id="rTick">READY</div>
        <div class="progress"><div class="fill" id="rProg"></div></div>
      </div>

      <div class="panel trade">
        <div class="bigbtns">
          <button class="big blong" id="bLong">▲ LONG 做多<span class="k">B</span></button>
          <button class="big bshort" id="bShort">▼ SHORT 做空<span class="k">S</span></button>
        </div>
        <div class="undertrade">
          <button class="flatbtn" id="bFlat">FLAT 平仓 · F</button>
          <div class="sizer"><span class="szlab">Size</span><button id="szDown">−</button><span class="sz" id="szVal">5</span><button id="szUp">+</button></div>
        </div>
      </div>

      <div class="panel transport">
        <button class="primary go" id="bPrimary">▶ Start 开始</button>
        <div class="speedbox"><span>Speed</span><input type="range" id="tSpeed" min="1" max="10" value="3"><span class="sv" id="svVal">3</span></div>
      </div>
    </div>

    <div class="col">
      <div class="panel lead">
        <div class="rail-h">Leaderboard 排行 · 同一行情</div>
        <div id="leadBody"></div>
      </div>
      <div class="panel estrip">
        <div class="eq" id="sEquity">$10,000<span class="sm">.00</span></div>
        <div class="eqline"><span class="k" id="sPos">FLAT 空仓</span><span id="sPnl" class="flat">$0.00</span></div>
      </div>
      <div class="panel board2">
        <div class="tabs">
          <span class="tab active" id="tabMine" data-t="mine">战绩</span>
          <span class="tab" id="tabPlayers" data-t="players">玩家榜<span class="env" id="pEnv"></span></span>
          <button class="clr" id="bClear">clear</button>
        </div>
        <div class="ssum" id="sSum"></div>
        <div class="slog" id="sLog"></div>
      </div>
    </div>
  </div>

  <div class="panel resultbar" id="resultBar" hidden>
    <div class="rb-info" id="rbInfo"></div>
    <div class="rb-actions">
      <input id="rbName" placeholder="handle 名字" maxlength="16">
      <button class="abtn up" id="bUpload">🏆 上传</button>
      <button class="abtn" id="bShare">🔗 分享</button>
    </div>
    <div class="rb-hint" id="rbHint"></div>
  </div>

  <div class="panel verdict">
    <h2>The Verdict · 判决</h2>
    <div class="vgrid">
      <div class="metric"><div class="lab">Drift 漂移</div><div class="val" id="vDrift">—</div><div class="note">expected 0</div></div>
      <div class="metric"><div class="lab">Your rank 你的名次</div><div class="val" id="vRank">—</div><div class="note">5 traders</div></div>
      <div class="metric"><div class="lab">vs 🐒 Monkey</div><div class="val" id="vMonkey">—</div><div class="note" id="vMonkeyNote">你 − 猴子</div></div>
    </div>
    <div class="ruling" id="vRuling">
      <span class="tag wait">待开始</span>点 START。价格是零漂移的鞅——没有信号。你会和 4 个机器人在<b>同一条行情</b>上赛跑,看名次能不能稳定超过纯运气。
    </div>
  </div>
</div>

<div class="overlay" id="overlay" hidden>
  <div class="cardmodal">
    <canvas id="shareCanvas" width="1280" height="720"></canvas>
    <div class="cm-actions">
      <button class="abtn up" id="dlPng">下载 PNG</button>
      <button class="abtn" id="copyTxt">复制文案</button>
      <button class="abtn" id="closeShare">关闭</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
(function(){
  'use strict';
  const $=id=>document.getElementById(id);
  const cssCache={};
  const css=v=>cssCache[v]||(cssCache[v]=getComputedStyle(document.documentElement).getPropertyValue(v).trim());

  // ---------- layered storage: Worker leaderboard -> Claude shared storage -> localStorage -> memory ----------
  const LEADERBOARD_API = ''.trim().replace(/\/+$/,'');
  const hasWS = (typeof window!=='undefined' && window.storage && typeof window.storage.get==='function');
  let hasLS=false; try{const k='__n_t';localStorage.setItem(k,'1');localStorage.removeItem(k);hasLS=true;}catch(e){}
  const mem={};
  const localEnv=()=>hasWS?'online':(hasLS?'local':'session');
  let ENV = LEADERBOARD_API?'online':localEnv();
  async function sget(key,shared){
    try{ if(hasWS){const r=await window.storage.get(key,!!shared); return r?r.value:null;} }catch(e){}
    try{ if(hasLS){return localStorage.getItem(key);} }catch(e){}
    return mem[key]||null;
  }
  async function sset(key,val,shared){
    try{ if(hasWS){await window.storage.set(key,val,!!shared); return;} }catch(e){}
    try{ if(hasLS){localStorage.setItem(key,val); return;} }catch(e){}
    mem[key]=val;
  }
  const K_MINE='noise:mine', K_PLAYERS='noise:players', K_NAME='noise:name';
  function cleanPlayers(list){
    if(!Array.isArray(list))return [];
    return list.filter(p=>p&&Number.isFinite(+p.ret)).map(p=>({
      name:String(p.name||'anon').slice(0,16),
      ret:+p.ret,
      seed:String(p.seed||'').slice(0,32),
      rank:parseInt(p.rank,10)||1,
      ts:parseInt(p.ts,10)||Date.now()
    })).sort((a,b)=>b.ret-a.ret).slice(0,50);
  }
  async function fetchGlobalPlayers(){
    if(!LEADERBOARD_API)return null;
    try{
      const r=await fetch(LEADERBOARD_API+'/leaderboard',{cache:'no-store'});
      if(!r.ok)throw new Error('leaderboard unavailable');
      const data=await r.json();
      ENV='online';
      return cleanPlayers(data.players);
    }catch(e){ ENV=localEnv(); return null; }
  }
  async function postGlobalPlayer(entry){
    if(!LEADERBOARD_API)return null;
    try{
      const r=await fetch(LEADERBOARD_API+'/leaderboard',{
        method:'POST',
        headers:{'content-type':'application/json'},
        body:JSON.stringify(entry)
      });
      if(!r.ok)throw new Error('leaderboard upload failed');
      const data=await r.json();
      ENV='online';
      return cleanPlayers(data.players);
    }catch(e){ ENV=localEnv(); return null; }
  }

  // ---------- RNG ----------
  function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
  function hashSeed(s){s=String(s);let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}
  let rng,monkeyRng,spare=null;
  function gauss(){if(spare!==null){const g=spare;spare=null;return g;}let u=0,v=0;while(u===0)u=rng();while(v===0)v=rng();const m=Math.sqrt(-2*Math.log(u));spare=m*Math.sin(2*Math.PI*v);return m*Math.cos(2*Math.PI*v);}

  // ---------- constants / state ----------
  const START=10000, PX=100, LB=6, BOT_SZ=5;
  let sigma, costBps, seedStr, roundLen;
  let price, ticks, buf, logSum, markers;
  let accts, human;
  let phase='ready';
  let acc=0, lastT=0, size=5, speed=3;
  let roundNo=0;
  let mine=[], players=[];
  let lastResult=null;               // {no,seed,ret,rank,n,qualifies,ts}
  let boardTab='mine';

  function makeAcct(id,name,glyph,human){return{id,name,glyph,human,pos:0,avg:0,real:0,fees:0,tradeRets:[],closes:0,wins:0};}
  function exec(a,side,qty){
    if(qty<=0)return;
    if(a.pos===0||Math.sign(a.pos)===side){const t=Math.abs(a.pos)+qty;a.avg=(a.avg*Math.abs(a.pos)+price*qty)/t;a.pos+=side*qty;}
    else{const cq=Math.min(qty,Math.abs(a.pos));const pnl=cq*(price-a.avg)*Math.sign(a.pos);a.real+=pnl;a.closes++;if(pnl>0)a.wins++;a.tradeRets.push(pnl);a.pos+=side*qty;const rem=qty-cq;if(rem>0)a.avg=price;else if(a.pos===0)a.avg=0;}
    const f=qty*price*costBps/10000;a.real-=f;a.fees+=f;
    if(a.human){markers.push({t:ticks,side});if(markers.length>80)markers.shift();}
  }
  function target(a,side,sz){const want=side*sz;const d=want-a.pos;if(d!==0)exec(a,Math.sign(d),Math.abs(d));}
  const equity=a=>START+a.real+a.pos*(price-a.avg);
  const retPct=a=>(equity(a)/START-1)*100;

  // ---------- round lifecycle ----------
  function loadRound(){
    seedStr=$('cfgSeed').value.trim()||'0';
    sigma=Math.max(0.01,parseFloat($('cfgSigma').value)||1)/100;
    costBps=Math.max(0,parseFloat($('cfgCost').value)||0);
    roundLen=Math.min(400,Math.max(30,parseInt($('cfgLen').value)||120));
    const eff='r'+roundNo+':'+seedStr;
    rng=mulberry32(hashSeed(eff)); monkeyRng=mulberry32(hashSeed(eff)^0x9E3779B9); spare=null;
    price=PX; ticks=0; buf=[PX]; logSum=0; markers=[];
    accts=[
      makeAcct('you','YOU','●',true),
      makeAcct('mom','Momentum 动量','↗',false),
      makeAcct('con','Contrarian 反转','↘',false),
      makeAcct('bh','Buy&Hold 持有','◆',false),
      makeAcct('monkey','Monkey 猴子','🐒',false),
    ];
    human=accts[0]; phase='ready';
    setLong(false); setShort(false);
    $('resultBar').hidden=true;
    draw(); renderHUD(); renderLead(); renderVerdict(); setPrimary();
  }
  function newRound(){ roundNo++; loadRound(); startRun(); }

  function stepBots(){
    const mom=accts[1],con=accts[2],bh=accts[3],mk=accts[4];
    if(ticks>LB){const sig=Math.sign(price-buf[buf.length-1-LB]);
      if(sig){ if(Math.sign(mom.pos)!==sig)target(mom,sig,BOT_SZ); if(Math.sign(con.pos)!==-sig)target(con,-sig,BOT_SZ); }}
    if(ticks===1) target(bh,1,BOT_SZ);
    if(monkeyRng()<0.05){const x=monkeyRng(),s=x<0.45?1:(x<0.9?-1:0);
      if(s===0){if(mk.pos)exec(mk,-Math.sign(mk.pos),Math.abs(mk.pos));} else target(mk,s,BOT_SZ);}
  }
  function tick(){
    const r=-0.5*sigma*sigma+sigma*gauss();
    price=price*Math.exp(r); logSum+=r; ticks++; buf.push(price);
    stepBots();
    if(ticks>=roundLen) finishRound();
  }
  function standings(){return accts.map(a=>({id:a.id,ret:retPct(a)})).sort((x,y)=>y.ret-x.ret);}
  function finishRound(){
    phase='done';
    const board=standings(), rank=board.findIndex(b=>b.id==='you')+1, ret=retPct(human);
    lastResult={no:roundNo, seed:seedStr, ret, rank, n:board.length, qualifies:(rank===1&&ret>0), ts:Date.now()};
    mine.unshift({no:roundNo,rank,ret,seed:seedStr,ts:lastResult.ts}); if(mine.length>60)mine.pop();
    sset(K_MINE,JSON.stringify(mine.slice(0,60)),false);
    showResultBar();
    if(boardTab==='mine') renderBoard();
    setPrimary();
  }

  // ---------- chart ----------
  const cv=$('chart'), ctx=cv.getContext('2d');
  function sizeCanvas(){const r=cv.getBoundingClientRect(),dpr=window.devicePixelRatio||1;cv.width=r.width*dpr;cv.height=r.height*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);draw();}
  function draw(){
    const W=cv.getBoundingClientRect().width,H=cv.getBoundingClientRect().height;
    ctx.clearRect(0,0,W,H);
    const pad={l:8,r:52,t:8,b:8},gw=W-pad.l-pad.r,gh=H-pad.t-pad.b;
    let lo=Math.min(...buf),hi=Math.max(...buf); if(hi-lo<1e-6){hi+=1;lo-=1;} const m=(hi-lo)*0.12;lo-=m;hi+=m;
    const span=Math.max(1,roundLen-1), X=i=>pad.l+(i/span)*gw, Y=p=>pad.t+(1-(p-lo)/(hi-lo))*gh;
    ctx.strokeStyle=css('--grid');ctx.lineWidth=1;
    for(let c=0;c<=8;c++){const x=pad.l+c/8*gw;ctx.beginPath();ctx.moveTo(x,pad.t);ctx.lineTo(x,pad.t+gh);ctx.stroke();}
    for(let c=0;c<=5;c++){const y=pad.t+c/5*gh;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+gw,y);ctx.stroke();}
    ctx.fillStyle=css('--dim');ctx.font='10px "JetBrains Mono",monospace';ctx.textAlign='left';
    for(let c=0;c<=5;c++){const p=hi-(c/5)*(hi-lo);ctx.fillText(p.toFixed(2),pad.l+gw+7,pad.t+c/5*gh+3);}
    if(human&&human.pos!==0){const y=Y(human.avg);ctx.strokeStyle=human.pos>0?css('--long'):css('--short');ctx.globalAlpha=.5;ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+gw,y);ctx.stroke();ctx.setLineDash([]);ctx.globalAlpha=1;}
    markers.forEach(mk=>{const x=X(mk.t),yb=pad.t+gh-4;ctx.fillStyle=mk.side>0?css('--long'):css('--short');ctx.globalAlpha=.85;ctx.beginPath();if(mk.side>0){ctx.moveTo(x,yb-8);ctx.lineTo(x-4,yb);ctx.lineTo(x+4,yb);}else{ctx.moveTo(x,yb);ctx.lineTo(x-4,yb-8);ctx.lineTo(x+4,yb-8);}ctx.closePath();ctx.fill();ctx.globalAlpha=1;});
    ctx.strokeStyle=css('--signal');ctx.lineWidth=1.6;ctx.shadowColor=css('--signal');ctx.shadowBlur=8;ctx.lineJoin='round';
    ctx.beginPath();for(let i=0;i<buf.length;i++){const x=X(i),y=Y(buf[i]);i?ctx.lineTo(x,y):ctx.moveTo(x,y);}ctx.stroke();ctx.shadowBlur=0;
    const hx=X(buf.length-1),hy=Y(buf[buf.length-1]);ctx.fillStyle=css('--signal');ctx.beginPath();ctx.arc(hx,hy,3,0,7);ctx.fill();
  }

  // ---------- formatting ----------
  const fmt=(n,d=2)=>n.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
  const money=n=>(n<0?'-$':'$')+fmt(Math.abs(n));
  const cls=n=>n>1e-9?'up':n<-1e-9?'down':'flat';
  const sgn=n=>(n>=0?'+':'');

  function renderHUD(){
    const bh=(price/PX-1)*100, eq=equity(human), unreal=human.pos*(price-human.avg);
    $('rPrice').textContent=fmt(price);
    const c=$('rChg');c.textContent=sgn(bh)+fmt(bh)+'%';c.className='chg '+cls(bh);
    $('rTick').textContent=phase==='ready'?'READY':(phase==='done'?'ROUND '+roundNo+' · DONE':'TICK '+ticks+' / '+roundLen);

    $('sPos').textContent=human.pos===0?'FLAT 空仓':((human.pos>0?'LONG +':'SHORT ')+human.pos+' @ '+fmt(human.avg));
    const pn=$('sPnl');pn.textContent=money(human.real+unreal);pn.className=cls(human.real+unreal);
  }

  function renderLead(){
    const rows=accts.map(a=>({a,ret:retPct(a)})).sort((x,y)=>y.ret-x.ret);
    const maxAbs=Math.max(0.4,...rows.map(r=>Math.abs(r.ret))), medals=['🥇','🥈','🥉'];
    $('leadBody').innerHTML=rows.map((r,i)=>{
      const a=r.a,w=Math.min(50,Math.abs(r.ret)/maxAbs*50),pos=r.ret>=0,col=pos?css('--long'):css('--short');
      const fill=pos?`left:50%;width:${w}%;background:${col}`:`right:50%;width:${w}%;background:${col}`;
      return `<div class="lrow${a.human?' you':''}"><div class="medal">${medals[i]||(i+1)}</div><div>
        <div class="lname"><span class="who"><span class="g">${a.glyph}</span>${a.name}</span><span class="ret ${cls(r.ret)}">${sgn(r.ret)}${fmt(r.ret)}%</span></div>
        <div class="bar"><div class="mid"></div><div class="fill" style="${fill}"></div></div></div></div>`;
    }).join('');
  }

  function renderBoard(){
    $('pEnv').textContent = ENV==='online'?'· 在线':(ENV==='local'?'· 本机':'· 临时');
    const sum=$('sSum'), log=$('sLog');
    if(boardTab==='mine'){
      if(!mine.length){sum.innerHTML='';log.innerHTML='<div class="sempty">跑完一局,名次记在这里</div>';return;}
      const avgRank=mine.reduce((s,r)=>s+r.rank,0)/mine.length, best=Math.max(...mine.map(r=>r.ret));
      sum.innerHTML=`<span>均排名 <b>${avgRank.toFixed(1)} / 5</b></span><span>最佳 <b class="${cls(best)}">${sgn(best)}${fmt(best)}%</b></span>`;
      log.innerHTML=mine.map(r=>`<div class="sitem"><span class="rk ${r.rank<=2?'up':(r.rank>=4?'down':'flat')}">#${r.rank}</span><span class="r">R${r.no} · seed ${r.seed}</span><span class="${cls(r.ret)}">${sgn(r.ret)}${fmt(r.ret)}%</span></div>`).join('');

      sum.innerHTML=`<span>上榜玩家 <b>${players.length}</b></span><span>${ENV==='online'?'全球共享':'本机保存'}</span>`;

      }).join('');
    }
  }

  function renderVerdict(){
    const drift=ticks>0?logSum/ticks*100:0;
    const dv=$('vDrift');dv.textContent=sgn(drift)+fmt(drift,3)+'%';dv.className='val '+cls(drift);
    const board=standings(), rank=board.findIndex(b=>b.id==='you')+1;
    $('vRank').textContent='#'+rank;$('vRank').className='val '+(rank<=2?'up':rank>=4?'down':'flat');
    const monkey=accts.find(a=>a.id==='monkey'), diff=retPct(human)-retPct(monkey);
    const mv=$('vMonkey');mv.textContent=sgn(diff)+fmt(diff)+'%';mv.className='val '+cls(diff);
    const rul=$('vRuling'), n=human.tradeRets.length;
    if(phase==='ready'){rul.innerHTML='<span class="tag wait">待开始</span>点 START。价格是零漂移的鞅——没有信号。你会和 4 个机器人在<b>同一条行情</b>上赛跑,看名次能不能稳定超过纯运气。';return;}
    if(phase==='done'){
      let tag,txt;
      if(rank===1){tag='<span class="tag luck">运气</span>';txt=`本局<b>第 1</b>——跑赢了动量、反转、买入持有和一只猴子。但零漂移噪声上的冠军是一次抽签,不是 alpha。多跑几局,你的均排名会朝 <b>3.0 / 5</b> 回归。`;}
      else if(diff<0){tag='<span class="tag luck">输给猴子</span>';txt=`你排 <b>#${rank}</b>,还落后那只抛硬币的猴子 ${fmt(-diff)}%。名字唬人的动量、反转策略也一样贴着 0——没有信号可读。`;}
      else{tag='<span class="tag luck">运气</span>';txt=`你排 <b>#${rank} / 5</b>。跑够 10+ 局看右边的均排名:它会收敛到 3 附近,证明名次和抛硬币没区别。`;}
      if(human.fees>Math.abs(human.real+human.pos*(price-human.avg))*0.5 && retPct(human)<0){
        tag='<span class="tag cost">被成本吃掉</span>';txt=`你交易 ${n} 次,付了 <b>${money(human.fees)}</b> 手续费。零漂移市场本是零和,加成本就成了<b>负和</b>——交易越多,输得越稳。`;}
      rul.innerHTML=tag+txt; return;
    }
    if(n<3){rul.innerHTML='<span class="tag wait">进行中</span>用 B / S 一键翻多翻空。右边看你和机器人的实时名次。';}
    else{const mean=human.tradeRets.reduce((a,b)=>a+b,0)/n;rul.innerHTML=`<span class="tag wait">进行中</span>已 ${n} 笔,每笔均值 <b>${money(mean)}</b>。撑到收盘再看判决——在零漂移上,这个数会向 0 塌。`;}
  }

    $('rbInfo').innerHTML=`<span class="big ${cls(r.ret)}">${sgn(r.ret)}${fmt(r.ret)}%</span><span>名次 <b class="${r.rank<=2?'up':r.rank>=4?'down':'flat'}">#${r.rank}/${r.n}</b></span><span>seed ${r.seed}</span>`;

  // ---------- loop ----------
  function frame(ts){
    if(phase==='running'){
      if(!lastT)lastT=ts; acc+=ts-lastT; lastT=ts;
      const interval=Math.round(680*Math.pow(0.79,speed-1));
      let did=false;
      while(acc>=interval&&phase==='running'){tick();acc-=interval;did=true;}
      if(did)renderAll();
    } else lastT=0;
    requestAnimationFrame(frame);
  }

  // ---------- controls ----------
  function setLong(on){$('bLong').classList.toggle('on',on);}
  function setShort(on){$('bShort').classList.toggle('on',on);}
  function refreshTradeBtns(){setLong(human.pos>0);setShort(human.pos<0);}
  function doLong(){if(phase==='ready')startRun();if(phase!=='done'){target(human,1,size);refreshTradeBtns();renderAll();}}
  function doShort(){if(phase==='ready')startRun();if(phase!=='done'){target(human,-1,size);refreshTradeBtns();renderAll();}}
  function doFlat(){if(phase!=='done'){if(human.pos!==0)exec(human,-Math.sign(human.pos),Math.abs(human.pos));refreshTradeBtns();renderAll();}}
  function setPrimary(){const b=$('bPrimary');b.classList.toggle('go',phase!=='running');
    b.textContent=phase==='ready'?'▶ Start 开始':phase==='running'?'⏸ Pause 暂停':phase==='paused'?'▶ Resume 继续':'↻ Next round 下一局';}
  function startRun(){phase='running';lastT=0;setPrimary();}
  function primaryClick(){if(phase==='ready')startRun();else if(phase==='running'){phase='paused';setPrimary();renderAll();}else if(phase==='paused')startRun();else newRound();}
  function setSize(v){size=Math.min(50,Math.max(1,v));$('szVal').textContent=size;}
  function switchTab(t){boardTab=t;$('tabMine').classList.toggle('active',t==='mine');$('tabPlayers').classList.toggle('active',t==='players');renderBoard();}

  $('bPrimary').onclick=primaryClick;
  $('bLong').onclick=doLong; $('bShort').onclick=doShort; $('bFlat').onclick=doFlat;
  $('szUp').onclick=()=>setSize(size+1); $('szDown').onclick=()=>setSize(size-1);
  $('tSpeed').oninput=e=>{speed=+e.target.value;$('svVal').textContent=speed;};
  $('tabMine').onclick=()=>switchTab('mine'); $('tabPlayers').onclick=()=>switchTab('players');
  $('bClear').onclick=async()=>{
    if(boardTab==='mine'){mine=[];await sset(K_MINE,'[]',false);}
    else if(ENV==='online'){toast('全球榜不能在前端清空');return;}
    else {players=[];await sset(K_PLAYERS,'[]',true);}
    renderBoard();
  };
  $('bUpload').onclick=doUpload; $('bShare').onclick=openShare;
  $('dlPng').onclick=downloadPng; $('copyTxt').onclick=copyText;
  $('closeShare').onclick=()=>{$('overlay').hidden=true;};
  $('overlay').onclick=e=>{if(e.target===$('overlay'))$('overlay').hidden=true;};
  ['cfgSeed','cfgSigma','cfgCost','cfgLen'].forEach(id=>$(id).addEventListener('change',()=>{roundNo=0;loadRound();}));
  document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT')return;
    const k=e.key.toLowerCase();
    if(k==='b')doLong();else if(k==='s')doShort();else if(k==='f')doFlat();
    else if(k==='escape')$('overlay').hidden=true;
    else if(e.code==='Space'){e.preventDefault();primaryClick();}
  });
  window.addEventListener('resize',sizeCanvas);

  // ---------- init ----------
  async function init(){
    try{const rn=await sget(K_NAME,false);if(rn)$('rbName').value=rn;}catch(e){}
    try{const rm=await sget(K_MINE,false);if(rm)mine=JSON.parse(rm)||[];}catch(e){mine=[];}
    const gp=await fetchGlobalPlayers();
    if(gp)players=gp;
    else{try{const rp=await sget(K_PLAYERS,true);if(rp)players=cleanPlayers(JSON.parse(rp)||[]);}catch(e){players=[];}}
    loadRound(); sizeCanvas(); renderBoard();
    requestAnimationFrame(frame);
  }
  init();
})();
</script>
</body>
</html>
