<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>纯随机市场 · Pure Random Market</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Noto+Serif+SC:wght@600;700;900&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F3E7CE; --panel:#FBF4E2; --panel2:#F0E4C9; --edge:#E4D3AC; --edge2:#D8C39A;
    --ink:#2B2016; --ink2:#4A3B29; --muted:#8A7659; --faint:#B7A583;
    --red:#C4351F; --green:#277A55; --gold:#B7852B; --gold-ink:#8F6A1B;
    --red-wash:#F4E1D5; --green-wash:#DDE9DF; --gold-wash:#F3E9CC;
    --plot:#3A2C1A; --grid:rgba(120,96,54,0.13); --hair:rgba(120,96,54,0.16);
    --disp:'Bricolage Grotesque',system-ui,sans-serif;
    --cjk:'Noto Serif SC','Bricolage Grotesque',serif;
    --mono:'Spline Sans Mono',ui-monospace,Menlo,monospace;
    --shadow:0 2px 10px -6px rgba(90,60,20,.30), 0 1px 2px rgba(90,60,20,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--paper); color:var(--ink); font-family:var(--disp); font-weight:500; -webkit-font-smoothing:antialiased; letter-spacing:-.005em;
    background-image:radial-gradient(900px 500px at 82% -8%, rgba(196,53,31,.05), transparent 60%),radial-gradient(700px 500px at 8% 108%, rgba(183,133,43,.06), transparent 60%),repeating-linear-gradient(0deg, rgba(120,96,54,.028) 0 1px, transparent 1px 26px);}
  .wrap{max-width:1060px; margin:0 auto; padding:22px 16px 40px}
  .mono{font-family:var(--mono); font-variant-numeric:tabular-nums}
  .up{color:var(--red)} .down{color:var(--green)} .flat{color:var(--muted)}
  .mk{display:block}

  header{display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:18px}
  .brand{display:flex; align-items:center; gap:13px}
  .logo{width:46px; height:46px; border-radius:13px; background:var(--red); color:#F7EDD8; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow); transform:rotate(-3deg)}
  .logo .mk{width:30px; height:30px}
  .brand h1{font-size:24px; font-weight:700; letter-spacing:.01em; line-height:1; font-family:var(--cjk)}
  .brand .sub{font-size:12.5px; color:var(--muted); font-weight:500; margin-top:3px}
  .topr{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
  .lang{display:flex; border:1.5px solid var(--edge); border-radius:9px; overflow:hidden; font-family:var(--mono)}
  .lang button{background:var(--panel); border:none; color:var(--muted); font-size:12px; font-weight:600; padding:6px 10px; cursor:pointer}
  .lang button.on{background:var(--gold); color:#2B2016}
  .config{display:flex; gap:7px; flex-wrap:wrap}
  .field{display:flex; flex-direction:column; gap:3px}
  .field label{font-size:10.5px; color:var(--muted); font-weight:600; padding-left:3px}
  .field input{width:58px; background:var(--panel); border:1.5px solid var(--edge); color:var(--ink); font-family:var(--mono); font-size:12.5px; font-weight:500; padding:6px 8px; border-radius:8px; outline:none}
  .field input:focus{border-color:var(--gold)}

  .board{display:grid; grid-template-columns:1fr 300px; gap:14px; align-items:start}
  .panel{background:var(--panel); border:1.5px solid var(--edge); border-radius:15px; box-shadow:var(--shadow)}
  .col{display:flex; flex-direction:column; gap:14px}
  .ph{font-size:13px; font-weight:700; color:var(--ink2); margin-bottom:12px; display:flex; align-items:center; gap:8px}
  .ph::before{content:""; width:8px; height:8px; border-radius:3px; background:var(--red); transform:rotate(45deg); flex:none}

  .chartwrap{position:relative; padding:3px}
  #chart{display:block; width:100%; height:344px; border-radius:12px}
  .readout{position:absolute; top:16px; left:18px; pointer-events:none}
  .readout .px{font-family:var(--mono); font-size:27px; font-weight:700; line-height:1; letter-spacing:-.01em}
  .readout .chg{font-family:var(--mono); font-size:12.5px; font-weight:600; margin-top:5px}
  .tickbadge{position:absolute; top:17px; right:18px; font-size:12px; color:var(--muted); font-weight:600; text-align:right; pointer-events:none}
  .progress{position:absolute; left:3px; right:3px; bottom:3px; height:4px; background:var(--edge); border-radius:0 0 12px 12px; overflow:hidden}
  .progress .fill{height:100%; width:0%; background:var(--gold); transition:width .1s linear}

  .trade{padding:16px}
  .bigbtns{display:grid; grid-template-columns:1fr 1fr; gap:11px}
  button.big{font-family:var(--disp); font-weight:800; font-size:18px; padding:19px 0; border-radius:13px; border:2px solid transparent; cursor:pointer; transition:transform .06s, box-shadow .14s, background .14s; position:relative}
  button.big:active{transform:translateY(1.5px)}
  .blong{background:var(--red-wash); border-color:rgba(196,53,31,.4); color:var(--red)}
  .bshort{background:var(--green-wash); border-color:rgba(39,122,85,.42); color:var(--green)}
  .blong.on{background:var(--red); color:#F7EDD8; border-color:var(--red); box-shadow:0 6px 18px -8px var(--red)}
  .bshort.on{background:var(--green); color:#F1EEDD; border-color:var(--green); box-shadow:0 6px 18px -8px var(--green)}
  button.big .k{position:absolute; top:8px; right:11px; font-family:var(--mono); font-size:10px; opacity:.55; font-weight:600}
  .undertrade{display:flex; align-items:center; gap:12px; margin-top:12px}
  .flatbtn{font-size:12.5px; font-weight:600; color:var(--muted); background:transparent; border:1.5px solid var(--edge); padding:9px 15px; border-radius:10px; cursor:pointer; font-family:var(--disp)}
  .flatbtn:hover{color:var(--ink); border-color:var(--muted)}
  .sizer{display:flex; align-items:center; gap:3px; margin-left:auto}
  .sizer .szlab{font-size:11px; color:var(--muted); font-weight:600; margin-right:7px}
  .sizer button{width:30px; height:30px; background:var(--panel2); border:1.5px solid var(--edge); color:var(--ink); border-radius:9px; cursor:pointer; font-size:17px; line-height:1; font-family:var(--disp); font-weight:700}
  .sizer button:active{transform:translateY(1px)}
  .sizer .sz{width:40px; text-align:center; font-size:15px; font-weight:700; font-family:var(--mono)}

  .transport{display:flex; align-items:center; gap:14px; padding:12px 15px}
  .primary{flex:1; font-family:var(--disp); font-weight:800; font-size:15px; padding:14px 0; border-radius:12px; border:2px solid var(--gold); background:var(--gold); color:#2B2016; cursor:pointer; transition:filter .12s, transform .06s; box-shadow:0 5px 16px -9px var(--gold)}
  .primary:hover{filter:brightness(1.05)} .primary:active{transform:translateY(1.5px)}
  .primary.run{background:var(--panel2); color:var(--ink2); box-shadow:none}
  .primary:disabled{opacity:.48; cursor:wait; filter:none; transform:none; box-shadow:none}
  .speedbox{display:flex; align-items:center; gap:9px; font-size:11.5px; color:var(--muted); font-weight:600}
  .speedbox .sv{color:var(--ink); width:14px; text-align:right; font-family:var(--mono)}
  input[type=range]{-webkit-appearance:none; appearance:none; height:4px; width:92px; background:var(--edge2); border-radius:4px; outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:var(--gold); border:2px solid var(--panel); cursor:pointer; box-shadow:0 1px 3px rgba(90,60,20,.3)}
  input[type=range]::-moz-range-thumb{width:16px; height:16px; border:2px solid var(--panel); border-radius:50%; background:var(--gold); cursor:pointer}

  .lead{padding:15px 16px}
  .lrow{display:grid; grid-template-columns:22px 1fr; gap:10px; align-items:center; padding:7px 0}
  .medal{font-family:var(--mono); font-size:13px; font-weight:600; text-align:center; color:var(--faint)}
  .coin{width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:11px; font-weight:700; color:#4A3410; background:radial-gradient(circle at 35% 30%, #F0D68A, var(--gold)); border:1px solid #9C7622; box-shadow:0 1px 2px rgba(90,60,20,.25)}
  .lname{display:flex; align-items:baseline; justify-content:space-between; gap:6px; margin-bottom:5px}
  .lname .who{font-size:13px; font-weight:600; display:flex; align-items:center; gap:6px; color:var(--ink2)}
  .lname .who .g{font-size:12px}
  .lname .ret{font-family:var(--mono); font-size:12.5px; font-weight:700; font-variant-numeric:tabular-nums}
  .bar{position:relative; height:6px; background:var(--panel2); border-radius:4px; overflow:hidden; border:1px solid var(--edge)}
  .bar .mid{position:absolute; left:50%; top:0; bottom:0; width:1px; background:var(--edge2)}
  .bar .fill{position:absolute; top:0; bottom:0; border-radius:4px}
  .lrow.you{background:var(--gold-wash); border-radius:10px; margin:0 -8px; padding:7px 8px}
  .lrow.you .who{color:var(--gold-ink); font-weight:800}

  .estrip{padding:14px 16px}
  .eq{font-family:var(--mono); font-size:25px; font-weight:700; letter-spacing:-.01em}
  .eq .sm{font-size:14px; color:var(--muted)}
  .eqline{display:flex; justify-content:space-between; margin-top:9px; font-size:12.5px; font-weight:600}
  .eqline .k{color:var(--muted)}

  .board2{padding:15px 16px}
  .tabs{display:flex; align-items:center; gap:5px; margin-bottom:13px}
  .tab{font-size:12.5px; font-weight:700; color:var(--muted); padding:6px 11px; border-radius:9px; cursor:pointer; border:1.5px solid transparent}
  .tab.active{color:var(--gold-ink); background:var(--gold-wash); border-color:var(--edge)}
  .tab .env{font-size:9.5px; margin-left:4px; font-weight:500; opacity:.8}
  .clr{margin-left:auto; font-size:11px; font-weight:600; color:var(--faint); background:none; border:none; cursor:pointer; font-family:var(--disp)}
  .clr:hover{color:var(--muted)}
  .ssum{font-size:12px; color:var(--muted); font-weight:600; margin-bottom:10px; display:flex; justify-content:space-between}
  .ssum b{color:var(--ink)}
  .slog{display:flex; flex-direction:column; gap:1px; max-height:188px; overflow-y:auto}
  .slog::-webkit-scrollbar{width:6px}.slog::-webkit-scrollbar-thumb{background:var(--edge2); border-radius:4px}
  .sitem{display:grid; grid-template-columns:auto 1fr auto; gap:9px; font-size:12px; padding:6px 0; border-bottom:1px solid var(--grid); align-items:baseline}
  .sitem .rk{font-weight:800; font-family:var(--mono)} .sitem .r{color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:500}
  .sitem .v{font-family:var(--mono); font-weight:700; font-variant-numeric:tabular-nums}
  .sitem.mine{background:var(--gold-wash); border-radius:8px; padding:6px 7px; margin:0 -7px}
  .sitem.mine .r{color:var(--gold-ink)}
  .sempty{font-size:12px; color:var(--faint); text-align:center; padding:18px 6px; line-height:1.7; font-weight:500}

  .resultbar{display:flex; align-items:center; gap:14px; padding:14px 16px; margin-top:14px; flex-wrap:wrap}
  .resultbar[hidden]{display:none}
  .rb-info{font-size:13px; color:var(--muted); font-weight:600; display:flex; align-items:center; gap:11px; flex-wrap:wrap}
  .rb-info .big{font-family:var(--mono); font-size:17px; font-weight:700}
  .rb-info b{color:var(--ink)}
  .rb-actions{display:flex; align-items:center; gap:9px; margin-left:auto; flex-wrap:wrap}
  .rb-actions input{width:120px; background:var(--panel2); border:1.5px solid var(--edge); color:var(--ink); font-family:var(--mono); font-size:12.5px; padding:9px 10px; border-radius:10px; outline:none}
  .rb-actions input:focus{border-color:var(--gold)}
  .abtn{font-family:var(--disp); font-weight:700; font-size:13px; padding:10px 16px; border-radius:11px; cursor:pointer; border:1.5px solid var(--edge); background:var(--panel2); color:var(--ink); transition:filter .12s, transform .06s}
  .abtn:hover{filter:brightness(1.04)} .abtn:active{transform:translateY(1px)}
  .abtn.up{background:var(--gold); border-color:var(--gold); color:#2B2016}
  .abtn:disabled{opacity:.42; cursor:not-allowed; filter:none}
  .rb-hint{font-size:11px; color:var(--faint); font-weight:500; width:100%; margin-top:-3px}

  .verdict{margin-top:14px; padding:22px 24px; position:relative; overflow:hidden}
  .seal{position:absolute; top:18px; right:22px; width:60px; height:60px; border:2.5px solid var(--red); border-radius:12px; color:var(--red); display:flex; align-items:center; justify-content:center; opacity:.82; transform:rotate(6deg); box-shadow:inset 0 0 0 2px rgba(196,53,31,.18)}
  .seal .mk{width:36px; height:36px}
  .fhead{font-size:13px; font-weight:700; color:var(--muted); letter-spacing:.04em; margin-bottom:6px}
  .grade{font-family:var(--cjk); font-size:40px; font-weight:900; letter-spacing:.02em; line-height:1.05; margin-bottom:16px}
  .vgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:17px; max-width:520px}
  .metric .lab{font-size:11.5px; color:var(--muted); font-weight:600; margin-bottom:5px}
  .metric .val{font-family:var(--mono); font-size:19px; font-weight:700; font-variant-numeric:tabular-nums}
  .metric .note{font-size:10.5px; color:var(--faint); font-weight:500; margin-top:3px}
  .ruling{font-size:15px; line-height:1.66; color:var(--ink2); border-top:1.5px dashed var(--edge2); padding-top:16px; max-width:640px; font-weight:500}
  .ruling b{color:var(--red); font-weight:700} .ruling .n{color:var(--gold-ink)}

  .overlay{position:fixed; inset:0; background:rgba(43,32,22,.6); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px}
  .overlay[hidden]{display:none}
  .cardmodal{background:var(--panel); border:1.5px solid var(--edge2); border-radius:18px; padding:16px; max-width:520px; width:100%; box-shadow:0 24px 60px -20px rgba(43,32,22,.5)}
  #shareCanvas{width:100%; height:auto; border-radius:12px; display:block}
  .cm-actions{display:flex; gap:9px; margin-top:14px; flex-wrap:wrap}
  .cm-actions .abtn{flex:1; text-align:center; padding:12px 0; min-width:96px}
  .toast{position:fixed; left:50%; bottom:28px; transform:translateX(-50%); background:var(--ink); border-radius:11px; color:var(--paper); font-size:13px; font-weight:600; padding:11px 18px; z-index:60; opacity:0; transition:opacity .2s; pointer-events:none; box-shadow:var(--shadow)}
  .toast.show{opacity:1}

  @media(max-width:820px){
    .board{grid-template-columns:1fr}
    #chart{height:288px}
    .vgrid{grid-template-columns:1fr 1fr}
    .rb-actions{margin-left:0}
    .seal{width:50px;height:50px}.seal .mk{width:30px;height:30px}
    .grade{font-size:32px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo"><svg class="mk" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="13" r="3.6"/><circle cx="24" cy="13" r="3.6"/><path d="M7 14a9 9 0 0 1 18 0c0 5.5-4 9.5-9 9.5S7 19.5 7 14Z"/><ellipse cx="16" cy="18.5" rx="5.2" ry="4"/><circle cx="13" cy="14" r="1.15" fill="currentColor" stroke="none"/><circle cx="19" cy="14" r="1.15" fill="currentColor" stroke="none"/><circle cx="14.6" cy="18.6" r=".8" fill="currentColor" stroke="none"/><circle cx="17.4" cy="18.6" r=".8" fill="currentColor" stroke="none"/></svg></div>
      <div><h1 id="brandTitle">纯随机市场</h1><div class="sub" id="brandSub"></div></div>
    </div>
    <div class="topr">
      <div class="lang"><button id="langZh" class="on">中</button><button id="langEn">EN</button></div>
      <div class="config">
        <div class="field"><label id="lblSeed">种子</label><input id="cfgSeed" value="1337" maxlength="32"></div>
        <div class="field"><label id="lblVol">波动%</label><input id="cfgSigma" value="1.0"></div>
        <div class="field"><label id="lblCost">成本‱</label><input id="cfgCost" value="2"></div>
        <div class="field"><label id="lblLen">局长</label><input id="cfgLen" value="120"></div>
      </div>
    </div>
  </header>

  <div class="board">
    <div class="col">
      <div class="panel chartwrap">
        <canvas id="chart"></canvas>
        <div class="readout"><div class="px" id="rPrice">100.00</div><div class="chg flat" id="rChg">+0.00%</div></div>
        <div class="tickbadge" id="rTick"></div>
        <div class="progress"><div class="fill" id="rProg"></div></div>
      </div>
      <div class="panel trade">
        <div class="bigbtns">
          <button class="big blong" id="bLong"></button>
          <button class="big bshort" id="bShort"></button>
        </div>
        <div class="undertrade">
          <button class="flatbtn" id="bFlat"></button>
          <div class="sizer"><span class="szlab" id="szLab">手数</span><button id="szDown">−</button><span class="sz" id="szVal">5</span><button id="szUp">+</button></div>
        </div>
      </div>
      <div class="panel transport">
        <button class="primary" id="bPrimary" disabled></button>
        <div class="speedbox"><span id="speedLab">速度</span><input type="range" id="tSpeed" min="1" max="10" value="3"><span class="sv" id="svVal">3</span></div>
      </div>
    </div>

    <div class="col">
      <div class="panel lead"><div class="ph" id="leadHead"></div><div id="leadBody"></div></div>
      <div class="panel estrip">
        <div class="eq" id="sEquity">$10,000<span class="sm">.00</span></div>
        <div class="eqline"><span class="k" id="sPos"></span><span id="sPnl" class="mono flat">$0.00</span></div>
      </div>
      <div class="panel board2">
        <div class="tabs">
          <span class="tab active" id="tabMine">我的战绩</span>
          <span class="tab" id="tabPlayers">江湖榜<span class="env" id="pEnv"></span></span>
          <button class="clr" id="bClear">清空</button>
        </div>
        <div class="ssum" id="sSum"></div>
        <div class="slog" id="sLog"></div>
      </div>
    </div>
  </div>

  <div class="panel resultbar" id="resultBar" hidden>
    <div class="rb-info" id="rbInfo"></div>
    <div class="rb-actions">
      <input id="rbName" placeholder="报个名号" maxlength="16">
      <button class="abtn up" id="bUpload"></button>
      <button class="abtn" id="bShare"></button>
    </div>
    <div class="rb-hint" id="rbHint"></div>
  </div>

  <div class="panel verdict">
    <div class="seal"><svg class="mk" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="13" r="3.6"/><circle cx="24" cy="13" r="3.6"/><path d="M7 14a9 9 0 0 1 18 0c0 5.5-4 9.5-9 9.5S7 19.5 7 14Z"/><ellipse cx="16" cy="18.5" rx="5.2" ry="4"/><circle cx="13" cy="14" r="1.15" fill="currentColor" stroke="none"/><circle cx="19" cy="14" r="1.15" fill="currentColor" stroke="none"/><circle cx="14.6" cy="18.6" r=".8" fill="currentColor" stroke="none"/><circle cx="17.4" cy="18.6" r=".8" fill="currentColor" stroke="none"/></svg></div>
    <div class="fhead" id="fhead">今日签文</div>
    <div class="grade" id="vGrade"></div>
    <div class="vgrid">
      <div class="metric"><div class="lab" id="mDrift">市场漂移</div><div class="val" id="vDrift">—</div><div class="note" id="mDriftNote">理论值 0</div></div>
      <div class="metric"><div class="lab" id="mRank">你的名次</div><div class="val" id="vRank">—</div><div class="note" id="mRankNote">共 5 位</div></div>
      <div class="metric"><div class="lab" id="mMonkey">比猴子强</div><div class="val" id="vMonkey">—</div><div class="note" id="vMonkeyNote">你 − 猴子</div></div>
    </div>
    <div class="ruling" id="vRuling"></div>
  </div>
</div>

<div class="overlay" id="overlay" hidden>
  <div class="cardmodal">
    <canvas id="shareCanvas" width="1280" height="720"></canvas>
    <div class="cm-actions">
      <button class="abtn up" id="dlPng"></button>
      <button class="abtn" id="copyLink"></button>
      <button class="abtn" id="copyTxt"></button>
      <button class="abtn" id="closeShare"></button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
(function(){
  'use strict';
  const $=id=>document.getElementById(id);
  const cssCache={}; const css=v=>cssCache[v]||(cssCache[v]=getComputedStyle(document.documentElement).getPropertyValue(v).trim());

    if(boardTab==='mine'){
      if(!mine.length){sum.innerHTML='';log.innerHTML=`<div class="sempty">${t('mineEmpty')}</div>`;return;}
      const avgRank=mine.reduce((s,r)=>s+r.rank,0)/mine.length,best=Math.max(...mine.map(r=>r.ret));
      sum.innerHTML=`<span>${t('avgRank')(avgRank.toFixed(1))}</span><span>${t('best')(pct(best),best)}</span>`;
      log.innerHTML=mine.map(r=>`<div class="sitem"><span class="rk ${r.rank<=2?'up':(r.rank>=4?'down':'flat')}">#${r.rank}</span><span class="r">${t('mineRow')(r.no,esc(r.seed))}</span><span class="v ${cls(r.ret)}">${pct(r.ret)}</span></div>`).join('');
    }else{
      if(!players.length){sum.innerHTML='';log.innerHTML=`<div class="sempty">${t('playersEmpty')}</div>`;return;}
      sum.innerHTML=`<span>${t('playersOn')(players.length)}</span><span>${t('shareScope')(!!apiBase||ENV==='online')}</span>`;
      const myTs=lastResult&&lastResult.ts;
      log.innerHTML=players.slice(0,20).map((p,i)=>{
        const mineFlag=(p.ts===myTs)?' mine':'';
        return `<div class="sitem${mineFlag}"><span class="rk ${i<3?'up':'flat'}">${i+1}</span><span class="r">${t('playerRow')(esc(p.name||'—'),esc(p.seed))}</span><span class="v ${cls(p.ret)}">${pct(p.ret)}</span></div>`;
      }).join('');
    }
  }
  function gradeInfo(rank){const g=t('grades')[rank]||'—';const c=rank<=2?'var(--red)':rank===3?'var(--gold-ink)':'var(--green)';return{t:g,c};}
  function renderVerdict(){
    const drift=ticks>0?logSum/ticks*100:0;
    const dv=$('vDrift');dv.textContent=sgn(drift)+fmt(drift,3)+'%';dv.className='val '+cls(drift);
    const board=standings(),rank=board.findIndex(b=>b.id==='you')+1;
    $('vRank').textContent='#'+rank;$('vRank').className='val '+(rank<=2?'up':rank>=4?'down':'flat');
    const monkey=accts.find(a=>a.id==='monkey'),diff=retPct(human)-retPct(monkey);
    const mv=$('vMonkey');mv.textContent=pct(diff);mv.className='val '+cls(diff);
    const grade=$('vGrade'),rul=$('vRuling'),n=human.tradeRets.length;
    if(phase==='ready'){grade.textContent=lang==='zh'?'待抽':'—';grade.style.color='var(--muted)';rul.innerHTML=t('rReady');return;}
    const gi=gradeInfo(rank);grade.textContent=gi.t;grade.style.color=gi.c;
    if(phase==='done'){
      let txt;
      if(rank===1)txt=t('rFirst');
      else if(diff<0)txt=t('rLoseMonkey')(rank,fmt(-diff)+'%');
      else txt=t('rMid')(rank);
      if(human.fees>Math.abs(human.real+human.pos*(price-human.avg))*0.5 && retPct(human)<0)txt=t('rCost')(n,money(human.fees));
      rul.innerHTML=txt;return;
    }
    if(n<3)rul.innerHTML=t('rRun0');
    else{const mean=human.tradeRets.reduce((a,b)=>a+b,0)/n;rul.innerHTML=t('rRun')(money(mean));}
  }
  function renderAll(){draw();renderHUD();renderLead();renderVerdict();}

  // ---------- result / upload ----------
  function showResultBar(){
    const r=lastResult;if(!r)return;const gi=gradeInfo(r.rank);
    uploadBusy=false;
    $('bUpload').textContent=t('upload');
    $('rbInfo').innerHTML=`${t('rbGrade')(gi.t,gi.c)}<span class="big ${cls(r.ret)}">${pct(r.ret)}</span><span>${t('rbRank')(r.rank,r.n)}</span><span>${t('rbSeed')(esc(r.seed))}</span>`;
    const canOK = apiBase ? r.canon : true;
    $('bUpload').disabled=!(r.qualifies&&canOK);
    $('rbHint').textContent = !r.qualifies ? t('hintNotFirst') : (apiBase&&!r.canon ? t('hintNotCanon') : '');
    $('resultBar').hidden=false;
  }
  async function doUpload(){
    const r=lastResult;if(!r||!r.qualifies||uploadBusy)return;
    uploadBusy=true;
    $('bUpload').disabled=true;
    $('bUpload').textContent=lang==='zh'?'上传中...':'Submitting...';
    const name=cleanName($('rbName').value);
    $('rbName').value=name;
    sset(K_NAME,name,false);
    if(apiBase && r.canon){
      try{
        const res=await fetch(apiBase+'/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,seed:r.seed,actions:r.actions})});
        const d=await res.json();
        if(d&&d.ok){players=d.board||players;afterUpload();toast(t('upOnline'));return;}
        uploadBusy=false; showResultBar(); toast(t('upReject'));return;
      }catch(e){ toast(t('upErr')); }
    }
    // local fallback
    const raw=await sget(K_PLAYERS,true);let list=[];try{list=raw?JSON.parse(raw):[];}catch(e){list=[];}
    list.push({name,ret:r.ret,seed:r.seed,ts:r.ts});list.sort((a,b)=>b.ret-a.ret);list=list.slice(0,50);
    await sset(K_PLAYERS,JSON.stringify(list),true);players=list;afterUpload();toast(t('upLocal'));
  }
  function afterUpload(){uploadBusy=false;boardTab='players';$('tabPlayers').classList.add('active');$('tabMine').classList.remove('active');renderBoard();$('bUpload').disabled=true;$('bUpload').textContent=lang==='zh'?'已上榜':'Submitted';if(lastResult)lastResult.qualifies=false;}

  // ---------- share ----------
  function challengeUrl(){
    const r=lastResult||{seed:seedStr};
    const base=location.origin+location.pathname;
    return `${base}?seed=${encodeURIComponent(r.seed)}&vol=${(sigma*100)}&cost=${costBps}&len=${roundLen}&lang=${lang}`;
  }
  function cardMonkey(g,cx,cy,s,col){g.strokeStyle=col;g.fillStyle=col;g.lineWidth=s*0.16;g.lineJoin='round';
    g.beginPath();g.arc(cx-s*0.78,cy-s*0.05,s*0.34,0,7);g.stroke();
    g.beginPath();g.arc(cx+s*0.78,cy-s*0.05,s*0.34,0,7);g.stroke();
    g.beginPath();g.ellipse(cx,cy,s*0.98,s*0.9,0,0,7);g.stroke();
    g.beginPath();g.ellipse(cx,cy+s*0.3,s*0.56,s*0.44,0,0,7);g.stroke();
    g.beginPath();g.arc(cx-s*0.34,cy-s*0.12,s*0.11,0,7);g.fill();
    g.beginPath();g.arc(cx+s*0.34,cy-s*0.12,s*0.11,0,7);g.fill();
    g.beginPath();g.arc(cx-s*0.17,cy+s*0.32,s*0.07,0,7);g.fill();
    g.beginPath();g.arc(cx+s*0.17,cy+s*0.32,s*0.07,0,7);g.fill();}
  function drawShareCard(){
    const r=lastResult||{ret:0,rank:5,n:5,seed:seedStr};
    const c=$('shareCanvas'),g=c.getContext('2d'),W=1280,H=720;
    g.fillStyle='#F3E7CE';g.fillRect(0,0,W,H);
    const grad=g.createRadialGradient(W*0.85,-40,60,W*0.85,-40,760);grad.addColorStop(0,'rgba(196,53,31,0.08)');grad.addColorStop(1,'rgba(196,53,31,0)');g.fillStyle=grad;g.fillRect(0,0,W,H);
    g.strokeStyle='#D8C39A';g.lineWidth=3;g.strokeRect(28,28,W-56,H-56);
    // monkey chip + title
    g.save();g.translate(84,92);g.rotate(-0.05);g.fillStyle='#C4351F';roundRect(g,-30,-34,60,60,15);g.fill();cardMonkey(g,0,-4,17,'#F7EDD8');g.restore();
    g.fillStyle='#2B2016';g.textAlign='left';g.textBaseline='alphabetic';g.font='800 46px "Bricolage Grotesque",sans-serif';g.fillText(t('title'),150,104);
    g.fillStyle='#8A7659';g.font='500 20px "Bricolage Grotesque",sans-serif';g.fillText(t('cardSub'),150,138);
    const px={l:74,r:74,t:196,w:W-148,h:236};
    let lo=Math.min(...buf),hi=Math.max(...buf);if(hi-lo<1e-6){hi+=1;lo-=1;}const m=(hi-lo)*0.1;lo-=m;hi+=m;
    const span=Math.max(1,buf.length-1),X=i=>px.l+i/span*px.w,Y=p=>px.t+(1-(p-lo)/(hi-lo))*px.h;
    g.strokeStyle='rgba(120,96,54,0.13)';g.lineWidth=1;
    for(let k=0;k<=6;k++){const x=px.l+k/6*px.w;g.beginPath();g.moveTo(x,px.t);g.lineTo(x,px.t+px.h);g.stroke();}
    for(let k=0;k<=4;k++){const y=px.t+k/4*px.h;g.beginPath();g.moveTo(px.l,y);g.lineTo(px.l+px.w,y);g.stroke();}
    g.strokeStyle='#3A2C1A';g.lineWidth=2.8;g.lineJoin='round';g.lineCap='round';
    g.beginPath();for(let i=0;i<buf.length;i++){const x=X(i),y=Y(buf[i]);i?g.lineTo(x,y):g.moveTo(x,y);}g.stroke();
    const gi=[null,{t:t('grades')[1],c:'#C4351F'},{t:t('grades')[2],c:'#C4351F'},{t:t('grades')[3],c:'#8F6A1B'},{t:t('grades')[4],c:'#277A55'},{t:t('grades')[5],c:'#277A55'}][r.rank]||{t:'—',c:'#8A7659'};
    g.textAlign='left';g.fillStyle='#8A7659';g.font='600 20px "Bricolage Grotesque",sans-serif';g.fillText(t('cardFortune'),74,494);
    g.fillStyle=gi.c;g.font='800 70px "Noto Serif SC","Bricolage Grotesque",serif';g.fillText(gi.t,74,566);
    const pos=(r.ret||0)>=0,col=pos?'#C4351F':'#277A55';
    g.textAlign='right';g.fillStyle='#8A7659';g.font='600 20px "Bricolage Grotesque",sans-serif';g.fillText(t('cardRR'),W-74,494);
    g.fillStyle=col;g.font='800 58px "Spline Sans Mono",monospace';g.fillText((pos?'+':'')+(r.ret!=null?r.ret.toFixed(2):'0.00')+'%',W-74,550);
    g.fillStyle='#4A3B29';g.font='700 32px "Spline Sans Mono",monospace';g.fillText(t('cardRankN')(r.rank||'-',r.n||5),W-74,596);
    g.textAlign='left';
    g.fillStyle='#4A3B29';g.font='600 23px "Bricolage Grotesque",sans-serif';g.fillText(r.rank===1?t('cardTagFirst'):t('cardTag'),74,632);
    g.fillStyle='#8A7659';g.font='500 17px "Spline Sans Mono",monospace';
    g.fillText('seed '+(r.seed||seedStr)+'   vol '+(sigma*100).toFixed(1)+'%   '+roundLen+'t   @shengmm81 / Ignis',74,666);
    return c;
  }
  function roundRect(g,x,y,w,h,r){g.beginPath();g.moveTo(x+r,y);g.arcTo(x+w,y,x+w,y+h,r);g.arcTo(x+w,y+h,x,y+h,r);g.arcTo(x,y+h,x,y,r);g.arcTo(x,y,x+w,y,r);g.closePath();}
  function openShare(){drawShareCard();$('overlay').hidden=false;}
  function downloadPng(){try{const url=$('shareCanvas').toDataURL('image/png');const a=document.createElement('a');a.href=url;a.download='noise-'+(lastResult?lastResult.seed:'')+'.png';document.body.appendChild(a);a.click();a.remove();toast(t('tSaved'));}catch(e){toast(t('tCopyFail'));}}
  function copyLink(){doCopy(challengeUrl(),t('tLinkCopied'));}
  function shareText(){
    const r=lastResult||{ret:0,rank:5,n:5,seed:seedStr};const gi=t('grades')[r.rank]||'';
    return t('shareTxt')(gi,r.seed,pct(r.ret),r.rank,r.n,r.rank===1,challengeUrl());
  }
  function copyText(){doCopy(shareText(),t('tTxtCopied'));}
  function doCopy(str,okMsg){
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(str).then(()=>toast(okMsg)).catch(()=>fallbackCopy(str,okMsg));}
    else fallbackCopy(str,okMsg);
  }
  function fallbackCopy(str,okMsg){const ta=document.createElement('textarea');ta.value=str;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast(okMsg);}catch(e){toast(t('tCopyFail'));}ta.remove();}
  let toastT=null;function toast(msg){const el=$('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2000);}

  // ---------- loop ----------
  function frame(ts){
    if(phase==='running'){
      if(!lastT)lastT=ts;acc+=ts-lastT;lastT=ts;
      const interval=Math.round(680*Math.pow(0.79,speed-1));
      let did=false;while(acc>=interval&&phase==='running'){tick();acc-=interval;did=true;}
      if(did)renderAll();
    }else lastT=0;
    requestAnimationFrame(frame);
  }

  // ---------- controls ----------
  function setLong(on){$('bLong').classList.toggle('on',on);}
  function setShort(on){$('bShort').classList.toggle('on',on);}
  function refreshTradeBtns(){setLong(human.pos>0);setShort(human.pos<0);}
  function doLong(){if(!appReady)return;if(phase==='ready')startRun();if(phase!=='done'){moveTo(human,1*size);logAction();refreshTradeBtns();renderAll();}}
  function doShort(){if(!appReady)return;if(phase==='ready')startRun();if(phase!=='done'){moveTo(human,-1*size);logAction();refreshTradeBtns();renderAll();}}
  function doFlat(){if(!appReady)return;if(phase!=='done'){if(human.pos!==0){moveTo(human,0);logAction();}refreshTradeBtns();renderAll();}}
  function setPrimary(){const b=$('bPrimary');b.classList.toggle('run',phase==='running');b.textContent=phase==='ready'?t('start'):phase==='running'?t('pause'):phase==='paused'?t('resume'):t('next');}
  function startRun(){if(!appReady)return;phase='running';lastT=0;setPrimary();}
  function primaryClick(){if(!appReady)return;if(phase==='ready')startRun();else if(phase==='running'){phase='paused';setPrimary();renderAll();}else if(phase==='paused')startRun();else newRound();}
  function setSize(v){size=Math.min(50,Math.max(1,v));$('szVal').textContent=size;}
  function switchTab(x){boardTab=x;$('tabMine').classList.toggle('active',x==='mine');$('tabPlayers').classList.toggle('active',x==='players');renderBoard();}

  // ---------- static i18n ----------
  function applyStatic(){
    document.documentElement.lang=lang;
    $('brandTitle').textContent=t('title'); $('brandSub').textContent=t('sub');
    $('lblSeed').textContent=t('seed');$('lblVol').textContent=t('vol');$('lblCost').textContent=t('cost');$('lblLen').textContent=t('len');
    $('bLong').innerHTML=t('long')+'<span class="k">B</span>'; $('bShort').innerHTML=t('short')+'<span class="k">S</span>';
    $('bFlat').textContent=t('flat'); $('szLab').textContent=t('sizeLab'); $('speedLab').textContent=t('speed');
    $('leadHead').textContent=t('leadHead');
    $('tabMine').textContent=t('tabMine');
    $('tabPlayers').firstChild.textContent=t('tabPlayers'); // keep env span
    $('bClear').textContent=t('clear');
    $('rbName').placeholder=t('nameHolder'); $('bUpload').textContent=t('upload'); $('bShare').textContent=t('share');
    $('fhead').textContent=t('fhead');
    $('mDrift').textContent=t('mDrift');$('mDriftNote').textContent=t('mDriftNote');
    $('mRank').textContent=t('mRank');$('mRankNote').textContent=t('mRankNote');
    $('mMonkey').textContent=t('mMonkey');$('vMonkeyNote').textContent=t('mMonkeyNote');
    $('dlPng').textContent=t('savePng');$('copyLink').textContent=t('copyLink');$('copyTxt').textContent=t('copyTxt');$('closeShare').textContent=t('close');
    $('langZh').classList.toggle('on',lang==='zh');$('langEn').classList.toggle('on',lang==='en');
  }
  function setLang(x){lang=x;sset(K_LANG,x,false);applyStatic();if(!appReady)return;renderHUD();renderLead();renderVerdict();renderBoard();setPrimary();if(!$('resultBar').hidden&&lastResult)showResultBar();}

  $('bPrimary').onclick=primaryClick;
  $('bLong').onclick=doLong;$('bShort').onclick=doShort;$('bFlat').onclick=doFlat;
  $('szUp').onclick=()=>setSize(size+1);$('szDown').onclick=()=>setSize(size-1);
  $('tSpeed').oninput=e=>{speed=+e.target.value;$('svVal').textContent=speed;};
  $('tabMine').onclick=()=>switchTab('mine');$('tabPlayers').onclick=()=>switchTab('players');
  $('bClear').onclick=async()=>{if(boardTab==='mine'){mine=[];await sset(K_MINE,'[]',false);}else if(apiBase){toast(lang==='zh'?'全网江湖榜不能在前端清空':'The global board cannot be cleared here');return;}else{players=[];await sset(K_PLAYERS,'[]',true);}renderBoard();};
  $('bUpload').onclick=doUpload;$('bShare').onclick=openShare;
  $('dlPng').onclick=downloadPng;$('copyLink').onclick=copyLink;$('copyTxt').onclick=copyText;
  $('closeShare').onclick=()=>{$('overlay').hidden=true;};
  $('overlay').onclick=e=>{if(e.target===$('overlay'))$('overlay').hidden=true;};
  $('langZh').onclick=()=>setLang('zh');$('langEn').onclick=()=>setLang('en');
  ['cfgSeed','cfgSigma','cfgCost','cfgLen'].forEach(id=>$(id).addEventListener('change',()=>{roundNo=0;loadRound();}));
  document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT')return;const k=e.key.toLowerCase();
    if(k==='b')doLong();else if(k==='s')doShort();else if(k==='f')doFlat();
    else if(k==='escape')$('overlay').hidden=true;
    else if(e.code==='Space'){e.preventDefault();primaryClick();}
  });
  window.addEventListener('resize',sizeCanvas);

  async function loadPlayers(){
    if(apiBase){try{const res=await fetch(apiBase+'/leaderboard');const d=await res.json();if(d&&d.ok)players=d.board||[];}catch(e){players=[];}}
    else{try{const rp=await sget(K_PLAYERS,true);if(rp)players=JSON.parse(rp)||[];}catch(e){players=[];}}
  }
  async function init(){
    // challenge-link params
    if(qp.get('seed'))$('cfgSeed').value=qp.get('seed');
    if(qp.get('vol'))$('cfgSigma').value=qp.get('vol');
    if(qp.get('cost'))$('cfgCost').value=qp.get('cost');
    if(qp.get('len'))$('cfgLen').value=qp.get('len');
    try{const sl=await sget(K_LANG,false);if((sl==='zh'||sl==='en')&&!qp.get('lang'))lang=sl;}catch(e){}
    try{const rn=await sget(K_NAME,false);if(rn)$('rbName').value=rn;}catch(e){}
    try{const rm=await sget(K_MINE,false);if(rm)mine=JSON.parse(rm)||[];}catch(e){mine=[];}
    applyStatic(); loadRound(); sizeCanvas(); renderBoard();
    appReady=true; $('bPrimary').disabled=false;
    requestAnimationFrame(frame);
    await loadPlayers(); renderBoard();
  }
  init();
})();
</script>
</body>
</html>
