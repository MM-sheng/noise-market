<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>噪 · 纯随机市场</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Noto+Serif+SC:wght@600;700;900&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F3E7CE; --panel:#FBF4E2; --panel2:#F0E4C9; --edge:#E4D3AC; --edge2:#D8C39A;
    --ink:#2B2016; --ink2:#4A3B29; --muted:#8A7659; --faint:#B7A583;
    --red:#C4351F; --green:#277A55; --gold:#B7852B; --gold-ink:#8F6A1B;
    --red-wash:#F4E1D5; --green-wash:#DDE9DF; --gold-wash:#F3E9CC;
    --plot:#3A2C1A; --grid:rgba(120,96,54,0.13); --hair:rgba(120,96,54,0.16);
    --disp:'Bricolage Grotesque',system-ui,sans-serif;
    --cjk:'Noto Serif SC','Bricolage Grotesque',serif;
    --mono:'Spline Sans Mono',ui-monospace,Menlo,monospace;
    --shadow:0 2px 10px -6px rgba(90,60,20,.30), 0 1px 2px rgba(90,60,20,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--paper); color:var(--ink); font-family:var(--disp); font-weight:500;
    -webkit-font-smoothing:antialiased; letter-spacing:-.005em;
    background-image:
      radial-gradient(900px 500px at 82% -8%, rgba(196,53,31,.05), transparent 60%),
      radial-gradient(700px 500px at 8% 108%, rgba(183,133,43,.06), transparent 60%),
      repeating-linear-gradient(0deg, rgba(120,96,54,.028) 0 1px, transparent 1px 26px);
  }
  .wrap{max-width:1060px; margin:0 auto; padding:22px 16px 40px}
  .mono{font-family:var(--mono); font-variant-numeric:tabular-nums}
  .up{color:var(--red)} .down{color:var(--green)} .flat{color:var(--muted)}

  /* header */
  header{display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:18px}
  .brand{display:flex; align-items:center; gap:13px}
  .logo{width:44px; height:44px; border-radius:12px; background:var(--red); color:#F7EDD8; display:flex; align-items:center; justify-content:center; font-size:26px; font-weight:900; box-shadow:var(--shadow); transform:rotate(-3deg); font-family:var(--cjk)}
  .brand h1{font-size:25px; font-weight:700; letter-spacing:.01em; line-height:1; font-family:var(--cjk)}
  .brand .sub{font-size:12.5px; color:var(--muted); font-weight:500; margin-top:3px}
  .config{display:flex; gap:7px; flex-wrap:wrap}
  .field{display:flex; flex-direction:column; gap:3px}
  .field label{font-size:10.5px; color:var(--muted); font-weight:600; padding-left:3px}
  .field input{width:60px; background:var(--panel); border:1.5px solid var(--edge); color:var(--ink); font-family:var(--mono); font-size:12.5px; font-weight:500; padding:6px 8px; border-radius:8px; outline:none}
  .field input:focus{border-color:var(--gold)}

  .board{display:grid; grid-template-columns:1fr 300px; gap:14px; align-items:start}
  .panel{background:var(--panel); border:1.5px solid var(--edge); border-radius:15px; box-shadow:var(--shadow)}
  .col{display:flex; flex-direction:column; gap:14px}
  .ph{font-size:13px; font-weight:700; color:var(--ink2); margin-bottom:12px; display:flex; align-items:center; gap:8px}
  .ph::before{content:""; width:8px; height:8px; border-radius:3px; background:var(--red); transform:rotate(45deg); flex:none}

  /* chart */
  .chartwrap{position:relative; padding:3px}
  #chart{display:block; width:100%; height:344px; border-radius:12px}
  .readout{position:absolute; top:16px; left:18px; pointer-events:none}
  .readout .px{font-family:var(--mono); font-size:27px; font-weight:700; line-height:1; letter-spacing:-.01em}
  .readout .chg{font-family:var(--mono); font-size:12.5px; font-weight:600; margin-top:5px}
  .tickbadge{position:absolute; top:17px; right:18px; font-size:12px; color:var(--muted); font-weight:600; text-align:right; pointer-events:none}
  .progress{position:absolute; left:3px; right:3px; bottom:3px; height:4px; background:var(--edge); border-radius:0 0 12px 12px; overflow:hidden}
  .progress .fill{height:100%; width:0%; background:var(--gold); transition:width .1s linear}

  /* trade */
  .trade{padding:16px}
  .bigbtns{display:grid; grid-template-columns:1fr 1fr; gap:11px}
  button.big{font-family:var(--disp); font-weight:800; font-size:18px; padding:19px 0; border-radius:13px; border:2px solid transparent; cursor:pointer; transition:transform .06s, box-shadow .14s, background .14s; position:relative}
  button.big:active{transform:translateY(1.5px)}
  .blong{background:var(--red-wash); border-color:rgba(196,53,31,.4); color:var(--red)}
  .bshort{background:var(--green-wash); border-color:rgba(39,122,85,.42); color:var(--green)}
  .blong.on{background:var(--red); color:#F7EDD8; border-color:var(--red); box-shadow:0 6px 18px -8px var(--red)}
  .bshort.on{background:var(--green); color:#F1EEDD; border-color:var(--green); box-shadow:0 6px 18px -8px var(--green)}
  button.big .k{position:absolute; top:8px; right:11px; font-family:var(--mono); font-size:10px; opacity:.55; font-weight:600}
  .undertrade{display:flex; align-items:center; gap:12px; margin-top:12px}
  .flatbtn{font-size:12.5px; font-weight:600; color:var(--muted); background:transparent; border:1.5px solid var(--edge); padding:9px 15px; border-radius:10px; cursor:pointer; font-family:var(--disp)}
  .flatbtn:hover{color:var(--ink); border-color:var(--muted)}
  .sizer{display:flex; align-items:center; gap:3px; margin-left:auto}
  .sizer .szlab{font-size:11px; color:var(--muted); font-weight:600; margin-right:7px}
  .sizer button{width:30px; height:30px; background:var(--panel2); border:1.5px solid var(--edge); color:var(--ink); border-radius:9px; cursor:pointer; font-size:17px; line-height:1; font-family:var(--disp); font-weight:700}
  .sizer button:active{transform:translateY(1px)}
  .sizer .sz{width:40px; text-align:center; font-size:15px; font-weight:700; font-family:var(--mono)}

  /* transport */
  .transport{display:flex; align-items:center; gap:14px; padding:12px 15px}
  .primary{flex:1; font-family:var(--disp); font-weight:800; font-size:15px; padding:14px 0; border-radius:12px; border:2px solid var(--gold); background:var(--gold); color:#2B2016; cursor:pointer; transition:filter .12s, transform .06s; box-shadow:0 5px 16px -9px var(--gold)}
  .primary:hover{filter:brightness(1.05)} .primary:active{transform:translateY(1.5px)}
  .primary:disabled{opacity:.45; cursor:wait; filter:none; box-shadow:none}
  .primary.run{background:var(--panel2); color:var(--ink2); box-shadow:none}
  .speedbox{display:flex; align-items:center; gap:9px; font-size:11.5px; color:var(--muted); font-weight:600}
  .speedbox .sv{color:var(--ink); width:14px; text-align:right; font-family:var(--mono)}
  input[type=range]{-webkit-appearance:none; appearance:none; height:4px; width:98px; background:var(--edge2); border-radius:4px; outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:var(--gold); border:2px solid var(--panel); cursor:pointer; box-shadow:0 1px 3px rgba(90,60,20,.3)}
  input[type=range]::-moz-range-thumb{width:16px; height:16px; border:2px solid var(--panel); border-radius:50%; background:var(--gold); cursor:pointer}

  /* leaderboard */
  .lead{padding:15px 16px}
  .lrow{display:grid; grid-template-columns:22px 1fr; gap:10px; align-items:center; padding:7px 0}
  .medal{font-family:var(--mono); font-size:13px; font-weight:600; text-align:center; color:var(--faint)}
  .coin{width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:11px; font-weight:700; color:#4A3410;
    background:radial-gradient(circle at 35% 30%, #F0D68A, var(--gold)); border:1px solid #9C7622; box-shadow:0 1px 2px rgba(90,60,20,.25)}
  .lname{display:flex; align-items:baseline; justify-content:space-between; gap:6px; margin-bottom:5px}
  .lname .who{font-size:13px; font-weight:600; display:flex; align-items:center; gap:6px; color:var(--ink2)}
  .lname .who .g{font-size:12px}
  .lname .ret{font-family:var(--mono); font-size:12.5px; font-weight:700; font-variant-numeric:tabular-nums}
  .bar{position:relative; height:6px; background:var(--panel2); border-radius:4px; overflow:hidden; border:1px solid var(--edge)}
  .bar .mid{position:absolute; left:50%; top:0; bottom:0; width:1px; background:var(--edge2)}
  .bar .fill{position:absolute; top:0; bottom:0; border-radius:4px}
  .lrow.you{background:var(--gold-wash); border-radius:10px; margin:0 -8px; padding:7px 8px}
  .lrow.you .who{color:var(--gold-ink); font-weight:800}

  /* equity */
  .estrip{padding:14px 16px}
  .eq{font-family:var(--mono); font-size:25px; font-weight:700; letter-spacing:-.01em}
  .eq .sm{font-size:14px; color:var(--muted)}
  .eqline{display:flex; justify-content:space-between; margin-top:9px; font-size:12.5px; font-weight:600}
  .eqline .k{color:var(--muted)}
  .eqline .mono{font-weight:700}

  /* board tabs */
  .board2{padding:15px 16px}
  .tabs{display:flex; align-items:center; gap:5px; margin-bottom:13px}
  .tab{font-size:12.5px; font-weight:700; color:var(--muted); padding:6px 11px; border-radius:9px; cursor:pointer; border:1.5px solid transparent}
  .tab.active{color:var(--gold-ink); background:var(--gold-wash); border-color:var(--edge)}
  .tab .env{font-size:9.5px; margin-left:4px; font-weight:500; opacity:.8}
  .clr{margin-left:auto; font-size:11px; font-weight:600; color:var(--faint); background:none; border:none; cursor:pointer; font-family:var(--disp)}
  .clr:hover{color:var(--muted)}
  .ssum{font-size:12px; color:var(--muted); font-weight:600; margin-bottom:10px; display:flex; justify-content:space-between}
  .ssum b{color:var(--ink)}
  .slog{display:flex; flex-direction:column; gap:1px; max-height:188px; overflow-y:auto}
  .slog::-webkit-scrollbar{width:6px}.slog::-webkit-scrollbar-thumb{background:var(--edge2); border-radius:4px}
  .sitem{display:grid; grid-template-columns:auto 1fr auto; gap:9px; font-size:12px; padding:6px 0; border-bottom:1px solid var(--grid); align-items:baseline}
  .sitem .rk{font-weight:800; font-family:var(--mono)} .sitem .r{color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:500}
  .sitem .v{font-family:var(--mono); font-weight:700; font-variant-numeric:tabular-nums}
  .sitem.mine{background:var(--gold-wash); border-radius:8px; padding:6px 7px; margin:0 -7px}
  .sitem.mine .r{color:var(--gold-ink)}
  .sempty{font-size:12px; color:var(--faint); text-align:center; padding:18px 6px; line-height:1.7; font-weight:500}

  /* result bar */
  .resultbar{display:flex; align-items:center; gap:14px; padding:14px 16px; margin-top:14px; flex-wrap:wrap}
  .resultbar[hidden]{display:none}
  .rb-info{font-size:13px; color:var(--muted); font-weight:600; display:flex; align-items:center; gap:11px; flex-wrap:wrap}
  .rb-info .big{font-family:var(--mono); font-size:17px; font-weight:700}
  .rb-info b{color:var(--ink)}
  .rb-actions{display:flex; align-items:center; gap:9px; margin-left:auto; flex-wrap:wrap}
  .rb-actions input{width:120px; background:var(--panel2); border:1.5px solid var(--edge); color:var(--ink); font-family:var(--mono); font-size:12.5px; padding:9px 10px; border-radius:10px; outline:none}
  .rb-actions input:focus{border-color:var(--gold)}
  .abtn{font-family:var(--disp); font-weight:700; font-size:13px; padding:10px 16px; border-radius:11px; cursor:pointer; border:1.5px solid var(--edge); background:var(--panel2); color:var(--ink); transition:filter .12s, transform .06s}
  .abtn:hover{filter:brightness(1.04)} .abtn:active{transform:translateY(1px)}
  .abtn.up{background:var(--gold); border-color:var(--gold); color:#2B2016}
  .abtn:disabled{opacity:.42; cursor:not-allowed; filter:none}
  .rb-hint{font-size:11px; color:var(--faint); font-weight:500; width:100%; margin-top:-3px}

  /* fortune verdict — signature */
  .verdict{margin-top:14px; padding:22px 24px; position:relative; overflow:hidden}
  .seal{position:absolute; top:18px; right:22px; width:58px; height:58px; border:2.5px solid var(--red); border-radius:11px; color:var(--red); display:flex; align-items:center; justify-content:center; font-size:30px; font-weight:900; opacity:.82; transform:rotate(6deg); font-family:var(--cjk); box-shadow:inset 0 0 0 2px rgba(196,53,31,.18)}
  .fhead{font-size:13px; font-weight:700; color:var(--muted); letter-spacing:.04em; margin-bottom:6px}
  .grade{font-family:var(--cjk); font-size:40px; font-weight:900; letter-spacing:.04em; line-height:1.05; margin-bottom:16px}
  .vgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:17px; max-width:520px}
  .metric .lab{font-size:11.5px; color:var(--muted); font-weight:600; margin-bottom:5px}
  .metric .val{font-family:var(--mono); font-size:19px; font-weight:700; font-variant-numeric:tabular-nums}
  .metric .note{font-size:10.5px; color:var(--faint); font-weight:500; margin-top:3px}
  .ruling{font-size:15px; line-height:1.66; color:var(--ink2); border-top:1.5px dashed var(--edge2); padding-top:16px; max-width:640px; font-weight:500}
  .ruling b{color:var(--red); font-weight:700}
  .ruling .n{color:var(--gold-ink)}

  /* share overlay */
  .overlay{position:fixed; inset:0; background:rgba(43,32,22,.6); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px}
  .overlay[hidden]{display:none}
  .cardmodal{background:var(--panel); border:1.5px solid var(--edge2); border-radius:18px; padding:16px; max-width:520px; width:100%; box-shadow:0 24px 60px -20px rgba(43,32,22,.5)}
  #shareCanvas{width:100%; height:auto; border-radius:12px; display:block}
  .cm-actions{display:flex; gap:9px; margin-top:14px}
  .cm-actions .abtn{flex:1; text-align:center; padding:12px 0}
  .toast{position:fixed; left:50%; bottom:28px; transform:translateX(-50%); background:var(--ink); border-radius:11px; color:var(--paper); font-size:13px; font-weight:600; padding:11px 18px; z-index:60; opacity:0; transition:opacity .2s; pointer-events:none; box-shadow:var(--shadow)}
  .toast.show{opacity:1}

  @media(max-width:820px){
    .board{grid-template-columns:1fr}
    #chart{height:288px}
    .vgrid{grid-template-columns:1fr 1fr}
    .rb-actions{margin-left:0}
    .seal{width:48px;height:48px;font-size:24px}
    .grade{font-size:32px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo">噪</div>
      <div><h1>纯随机市场</h1><div class="sub">一场关于运气的实验 · 你读到的形态,都是自己编的</div></div>
    </div>
    <div class="config">
      <div class="field"><label>种子</label><input id="cfgSeed" value="1337" maxlength="32"></div>
      <div class="field"><label>波动%</label><input id="cfgSigma" value="1.0"></div>
      <div class="field"><label>成本‱</label><input id="cfgCost" value="2"></div>
      <div class="field"><label>局长</label><input id="cfgLen" value="120"></div>
    </div>
  </header>

  <div class="board">
    <div class="col">
      <div class="panel chartwrap">
        <canvas id="chart"></canvas>
        <div class="readout"><div class="px" id="rPrice">100.00</div><div class="chg flat" id="rChg">+0.00%</div></div>
        <div class="tickbadge" id="rTick">就绪</div>
        <div class="progress"><div class="fill" id="rProg"></div></div>
      </div>

      <div class="panel trade">
        <div class="bigbtns">
          <button class="big blong" id="bLong">做多 ▲<span class="k">B</span></button>
          <button class="big bshort" id="bShort">做空 ▼<span class="k">S</span></button>
        </div>
        <div class="undertrade">
          <button class="flatbtn" id="bFlat">平仓 · F</button>
          <div class="sizer"><span class="szlab">手数</span><button id="szDown">−</button><span class="sz" id="szVal">5</span><button id="szUp">+</button></div>
        </div>
      </div>

      <div class="panel transport">
        <button class="primary" id="bPrimary" disabled>开始 ▶</button>
        <div class="speedbox"><span>速度</span><input type="range" id="tSpeed" min="1" max="10" value="3"><span class="sv" id="svVal">3</span></div>
      </div>
    </div>

    <div class="col">
      <div class="panel lead">
        <div class="ph">同场竞技 · 一样的行情</div>
        <div id="leadBody"></div>
      </div>
      <div class="panel estrip">
        <div class="eq" id="sEquity">$10,000<span class="sm">.00</span></div>
        <div class="eqline"><span class="k" id="sPos">空仓</span><span id="sPnl" class="mono flat">$0.00</span></div>
      </div>
      <div class="panel board2">
        <div class="tabs">
          <span class="tab active" id="tabMine" data-t="mine">我的战绩</span>
          <span class="tab" id="tabPlayers" data-t="players">江湖榜<span class="env" id="pEnv"></span></span>
          <button class="clr" id="bClear">清空</button>
        </div>
        <div class="ssum" id="sSum"></div>
        <div class="slog" id="sLog"></div>
      </div>
    </div>
  </div>

  <div class="panel resultbar" id="resultBar" hidden>
    <div class="rb-info" id="rbInfo"></div>
    <div class="rb-actions">
      <input id="rbName" placeholder="报个名号" maxlength="16">
      <button class="abtn up" id="bUpload">上榜 🏆</button>
      <button class="abtn" id="bShare">晒一张 🔗</button>
    </div>
    <div class="rb-hint" id="rbHint"></div>
  </div>

  <div class="panel verdict">
    <div class="seal">噪</div>
    <div class="fhead">今日签文</div>
    <div class="grade" id="vGrade">待抽</div>
    <div class="vgrid">
      <div class="metric"><div class="lab">市场漂移</div><div class="val" id="vDrift">—</div><div class="note">理论值 0</div></div>
      <div class="metric"><div class="lab">你的名次</div><div class="val" id="vRank">—</div><div class="note">共 5 位</div></div>
      <div class="metric"><div class="lab">比猴子强</div><div class="val" id="vMonkey">—</div><div class="note" id="vMonkeyNote">你 − 猴子</div></div>
    </div>
    <div class="ruling" id="vRuling">
      点「开始」。价格是零漂移的随机游走——里面<b>没有信号</b>。你会和 4 位对手(动量、反转、买入持有,还有一只抛硬币的猴子)在<span class="n">同一条行情</span>上同场竞技,看你的名次能不能稳定压过纯运气。
    </div>
  </div>
</div>

<div class="overlay" id="overlay" hidden>
  <div class="cardmodal">
    <canvas id="shareCanvas" width="1280" height="720"></canvas>
    <div class="cm-actions">
      <button class="abtn up" id="dlPng">存成图片</button>
      <button class="abtn" id="copyTxt">复制文案</button>
      <button class="abtn" id="closeShare">关闭</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
(function(){
  'use strict';
  const $=id=>document.getElementById(id);
  const cssCache={};
  const css=v=>cssCache[v]||(cssCache[v]=getComputedStyle(document.documentElement).getPropertyValue(v).trim());
  const esc=v=>String(v==null?'':v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const cleanText=(v,n)=>String(v||'').replace(/[<>&]/g,'').trim().slice(0,n);

  // ---------- layered storage: Worker leaderboard -> Claude shared storage -> localStorage -> memory ----------
  const LEADERBOARD_API='https://noise-market-leaderboard.mm-sheng.workers.dev'.trim().replace(/\/+$/,'');
  const hasWS=(typeof window!=='undefined'&&window.storage&&typeof window.storage.get==='function');
  let hasLS=false; try{const k='__n_t';localStorage.setItem(k,'1');localStorage.removeItem(k);hasLS=true;}catch(e){}
  const mem={};
  const localEnv=()=>hasWS?'online':(hasLS?'local':'session');
  let ENV=LEADERBOARD_API?'online':localEnv();
  async function sget(key,shared){
    try{ if(hasWS){const r=await window.storage.get(key,!!shared);return r?r.value:null;} }catch(e){}
    try{ if(hasLS){return localStorage.getItem(key);} }catch(e){}
    return mem[key]||null;
  }
  async function sset(key,val,shared){
    try{ if(hasWS){await window.storage.set(key,val,!!shared);return;} }catch(e){}
    try{ if(hasLS){localStorage.setItem(key,val);return;} }catch(e){}
    mem[key]=val;
  }
  const K_MINE='noise:mine',K_PLAYERS='noise:players',K_NAME='noise:name';
  function cleanPlayers(list){
    if(!Array.isArray(list))return [];
    return list.filter(p=>p&&Number.isFinite(+p.ret)).map(p=>({
      name:cleanText(p.name||'无名氏',16)||'无名氏',
      ret:+p.ret,
      seed:cleanText(p.seed||'',32),
      rank:parseInt(p.rank,10)||1,
      ts:parseInt(p.ts,10)||Date.now()
    })).sort((a,b)=>b.ret-a.ret).slice(0,50);
  }
  async function fetchGlobalPlayers(){
    if(!LEADERBOARD_API)return null;
    try{
      const r=await fetch(LEADERBOARD_API+'/leaderboard',{cache:'no-store'});
      if(!r.ok)throw new Error('leaderboard unavailable');
      const data=await r.json();
      ENV='online';
      return cleanPlayers(data.players);
    }catch(e){ENV=localEnv();return null;}
  }
  async function postGlobalPlayer(entry){
    if(!LEADERBOARD_API)return null;
    try{
      const r=await fetch(LEADERBOARD_API+'/leaderboard',{
        method:'POST',
        headers:{'content-type':'application/json'},
        body:JSON.stringify(entry)
      });
      if(!r.ok)throw new Error('leaderboard upload failed');
      const data=await r.json();
      ENV='online';
      return cleanPlayers(data.players);
    }catch(e){ENV=localEnv();return null;}
  }

  // ---------- RNG ----------
  function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
  function hashSeed(s){s=String(s);let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}
  let rng,monkeyRng,spare=null;
  function gauss(){if(spare!==null){const g=spare;spare=null;return g;}let u=0,v=0;while(u===0)u=rng();while(v===0)v=rng();const m=Math.sqrt(-2*Math.log(u));spare=m*Math.sin(2*Math.PI*v);return m*Math.cos(2*Math.PI*v);}

  // ---------- state ----------
  const START=10000,PX=100,LB=6,BOT_SZ=5;
  let sigma,costBps,seedStr,roundLen;
  let price,ticks,buf,logSum,markers;
  let accts,human;
  let phase='ready';
  let acc=0,lastT=0,size=5,speed=3;
  let roundNo=0, mine=[], players=[], lastResult=null, boardTab='mine', appReady=false;

  function makeAcct(id,name,glyph,human){return{id,name,glyph,human,pos:0,avg:0,real:0,fees:0,tradeRets:[],closes:0,wins:0};}
  function exec(a,side,qty){
    if(qty<=0)return;
    if(a.pos===0||Math.sign(a.pos)===side){const t=Math.abs(a.pos)+qty;a.avg=(a.avg*Math.abs(a.pos)+price*qty)/t;a.pos+=side*qty;}
    else{const cq=Math.min(qty,Math.abs(a.pos));const pnl=cq*(price-a.avg)*Math.sign(a.pos);a.real+=pnl;a.closes++;if(pnl>0)a.wins++;a.tradeRets.push(pnl);a.pos+=side*qty;const rem=qty-cq;if(rem>0)a.avg=price;else if(a.pos===0)a.avg=0;}
    const f=qty*price*costBps/10000;a.real-=f;a.fees+=f;
    if(a.human){markers.push({t:ticks,side});if(markers.length>80)markers.shift();}
  }
  function target(a,side,sz){const want=side*sz;const d=want-a.pos;if(d!==0)exec(a,Math.sign(d),Math.abs(d));}
  const equity=a=>START+a.real+a.pos*(price-a.avg);
  const retPct=a=>(equity(a)/START-1)*100;

  function loadRound(){
    seedStr=cleanText($('cfgSeed').value,32)||'0';
    $('cfgSeed').value=seedStr;
    sigma=Math.max(0.01,parseFloat($('cfgSigma').value)||1)/100;
    costBps=Math.max(0,parseFloat($('cfgCost').value)||0);
    roundLen=Math.min(400,Math.max(30,parseInt($('cfgLen').value)||120));
    const eff='r'+roundNo+':'+seedStr;
    rng=mulberry32(hashSeed(eff)); monkeyRng=mulberry32(hashSeed(eff)^0x9E3779B9); spare=null;
    price=PX; ticks=0; buf=[PX]; logSum=0; markers=[];
    accts=[
      makeAcct('you','你','●',true),
      makeAcct('mom','动量','↗',false),
      makeAcct('con','反转','↘',false),
      makeAcct('bh','买入持有','◆',false),
      makeAcct('monkey','猴子','🐒',false),
    ];
    human=accts[0]; phase='ready';
    setLong(false); setShort(false); $('resultBar').hidden=true;
    draw(); renderHUD(); renderLead(); renderVerdict(); setPrimary();
  }
  function newRound(){roundNo++; loadRound(); startRun();}

  function stepBots(){
    const mom=accts[1],con=accts[2],bh=accts[3],mk=accts[4];
    if(ticks>LB){const sig=Math.sign(price-buf[buf.length-1-LB]);
      if(sig){if(Math.sign(mom.pos)!==sig)target(mom,sig,BOT_SZ);if(Math.sign(con.pos)!==-sig)target(con,-sig,BOT_SZ);}}
    if(ticks===1)target(bh,1,BOT_SZ);
    if(monkeyRng()<0.05){const x=monkeyRng(),s=x<0.45?1:(x<0.9?-1:0);
      if(s===0){if(mk.pos)exec(mk,-Math.sign(mk.pos),Math.abs(mk.pos));}else target(mk,s,BOT_SZ);}
  }
  function tick(){const r=-0.5*sigma*sigma+sigma*gauss();price=price*Math.exp(r);logSum+=r;ticks++;buf.push(price);stepBots();if(ticks>=roundLen)finishRound();}
  function standings(){return accts.map(a=>({id:a.id,ret:retPct(a)})).sort((x,y)=>y.ret-x.ret);}
  function finishRound(){
    phase='done';
    const board=standings(),rank=board.findIndex(b=>b.id==='you')+1,ret=retPct(human);
    lastResult={no:roundNo,seed:seedStr,ret,rank,n:board.length,qualifies:(rank===1&&ret>0),ts:Date.now()};
    mine.unshift({no:roundNo,rank,ret,seed:seedStr,ts:lastResult.ts}); if(mine.length>60)mine.pop();
    sset(K_MINE,JSON.stringify(mine.slice(0,60)),false);
    showResultBar(); if(boardTab==='mine')renderBoard(); setPrimary();
  }

  // ---------- chart ----------
  const cv=$('chart'),ctx=cv.getContext('2d');
  function sizeCanvas(){const r=cv.getBoundingClientRect(),dpr=window.devicePixelRatio||1;cv.width=r.width*dpr;cv.height=r.height*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);draw();}
  function draw(){
    const W=cv.getBoundingClientRect().width,H=cv.getBoundingClientRect().height;
    ctx.clearRect(0,0,W,H);
    const pad={l:10,r:52,t:10,b:10},gw=W-pad.l-pad.r,gh=H-pad.t-pad.b;
    let lo=Math.min(...buf),hi=Math.max(...buf); if(hi-lo<1e-6){hi+=1;lo-=1;} const m=(hi-lo)*0.12;lo-=m;hi+=m;
    const span=Math.max(1,roundLen-1),X=i=>pad.l+(i/span)*gw,Y=p=>pad.t+(1-(p-lo)/(hi-lo))*gh;
    ctx.strokeStyle=css('--grid');ctx.lineWidth=1;
    for(let c=0;c<=8;c++){const x=pad.l+c/8*gw;ctx.beginPath();ctx.moveTo(x,pad.t);ctx.lineTo(x,pad.t+gh);ctx.stroke();}
    for(let c=0;c<=5;c++){const y=pad.t+c/5*gh;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+gw,y);ctx.stroke();}
    ctx.fillStyle=css('--faint');ctx.font='11px "Spline Sans Mono",monospace';ctx.textAlign='left';
    for(let c=0;c<=5;c++){const p=hi-(c/5)*(hi-lo);ctx.fillText(p.toFixed(2),pad.l+gw+7,pad.t+c/5*gh+3.5);}
    if(human&&human.pos!==0){const y=Y(human.avg);ctx.strokeStyle=human.pos>0?css('--red'):css('--green');ctx.globalAlpha=.55;ctx.setLineDash([5,4]);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+gw,y);ctx.stroke();ctx.setLineDash([]);ctx.globalAlpha=1;}
    markers.forEach(mk=>{const x=X(mk.t),yb=pad.t+gh-4;ctx.fillStyle=mk.side>0?css('--red'):css('--green');ctx.globalAlpha=.9;ctx.beginPath();if(mk.side>0){ctx.moveTo(x,yb-9);ctx.lineTo(x-4.5,yb);ctx.lineTo(x+4.5,yb);}else{ctx.moveTo(x,yb);ctx.lineTo(x-4.5,yb-9);ctx.lineTo(x+4.5,yb-9);}ctx.closePath();ctx.fill();ctx.globalAlpha=1;});
    ctx.strokeStyle=css('--plot');ctx.lineWidth=2.2;ctx.lineJoin='round';ctx.lineCap='round';
    ctx.beginPath();for(let i=0;i<buf.length;i++){const x=X(i),y=Y(buf[i]);i?ctx.lineTo(x,y):ctx.moveTo(x,y);}ctx.stroke();
    const hx=X(buf.length-1),hy=Y(buf[buf.length-1]);
    ctx.fillStyle=css('--paper');ctx.beginPath();ctx.arc(hx,hy,4.5,0,7);ctx.fill();
    ctx.fillStyle=css('--plot');ctx.beginPath();ctx.arc(hx,hy,3,0,7);ctx.fill();
  }

  // ---------- fmt ----------
  const fmt=(n,d=2)=>n.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
  const money=n=>(n<0?'-$':'$')+fmt(Math.abs(n));
  const cls=n=>n>1e-9?'up':n<-1e-9?'down':'flat';
  const sgn=n=>(n>=0?'+':'');

  function renderHUD(){
    const bh=(price/PX-1)*100,eq=equity(human),unreal=human.pos*(price-human.avg);
    $('rPrice').textContent=fmt(price);
    const c=$('rChg');c.textContent=sgn(bh)+fmt(bh)+'%';c.className='chg '+cls(bh);
    $('rTick').textContent=phase==='ready'?'就绪':(phase==='done'?'第 '+roundNo+' 局 · 收盘':'第 '+ticks+' / '+roundLen+' 拍');
    $('rProg').style.width=(ticks/roundLen*100)+'%';
    const w=Math.floor(eq);
    $('sEquity').innerHTML=(eq<0?'-$':'$')+Math.abs(w).toLocaleString()+'<span class="sm">.'+fmt(Math.abs(eq-w)).slice(2)+'</span>';
    $('sPos').textContent=human.pos===0?'空仓':((human.pos>0?'多 +':'空 ')+human.pos+' @ '+fmt(human.avg));
    const pn=$('sPnl');pn.textContent=money(human.real+unreal);pn.className='mono '+cls(human.real+unreal);
  }

  function renderLead(){
    const rows=accts.map(a=>({a,ret:retPct(a)})).sort((x,y)=>y.ret-x.ret);
    const maxAbs=Math.max(0.4,...rows.map(r=>Math.abs(r.ret)));
    $('leadBody').innerHTML=rows.map((r,i)=>{
      const a=r.a,w=Math.min(50,Math.abs(r.ret)/maxAbs*50),pos=r.ret>=0,col=pos?css('--red'):css('--green');
      const fill=pos?`left:50%;width:${w}%;background:${col}`:`right:50%;width:${w}%;background:${col}`;
      const rankCell=i<3?`<div class="coin">${i+1}</div>`:`<div class="medal">${i+1}</div>`;
      return `<div class="lrow${a.human?' you':''}">${rankCell}<div>
        <div class="lname"><span class="who"><span class="g">${a.glyph}</span>${a.name}</span><span class="ret ${cls(r.ret)}">${sgn(r.ret)}${fmt(r.ret)}%</span></div>
        <div class="bar"><div class="mid"></div><div class="fill" style="${fill}"></div></div></div></div>`;
    }).join('');
  }

  function renderBoard(){
    $('pEnv').textContent=ENV==='online'?'· 在线':(ENV==='local'?'· 本机':'· 临时');
    const sum=$('sSum'),log=$('sLog');
    if(boardTab==='mine'){
      if(!mine.length){sum.innerHTML='<span>本机战绩 <b>0</b></span><span>未开局</span>';log.innerHTML='<div class="sempty">跑完一局,名次记在这儿</div>';return;}
      const avgRank=mine.reduce((s,r)=>s+r.rank,0)/mine.length,best=Math.max(...mine.map(r=>r.ret));
      sum.innerHTML=`<span>平均名次 <b>${avgRank.toFixed(1)} / 5</b></span><span>最佳 <b class="${cls(best)}">${sgn(best)}${fmt(best)}%</b></span>`;
      log.innerHTML=mine.map(r=>`<div class="sitem"><span class="rk ${r.rank<=2?'up':(r.rank>=4?'down':'flat')}">#${r.rank}</span><span class="r">第${r.no}局 · 种子 ${esc(r.seed)}</span><span class="v ${cls(r.ret)}">${sgn(r.ret)}${fmt(r.ret)}%</span></div>`).join('');
    }else{
      if(!players.length){sum.innerHTML=`<span>上榜 <b>0</b> 人</span><span>${ENV==='online'?'全网共享':'本机保存'}</span>`;log.innerHTML='<div class="sempty">还没人上榜。<br>跑赢全部对手(名次 #1)才有资格。</div>';return;}
      sum.innerHTML=`<span>上榜 <b>${players.length}</b> 人</span><span>${ENV==='online'?'全网共享':'本机保存'}</span>`;
      const myTs=lastResult&&lastResult.ts;
      log.innerHTML=players.slice(0,20).map((p,i)=>{
        const mineFlag=(p.ts===myTs)?' mine':'';
        return `<div class="sitem${mineFlag}"><span class="rk ${i<3?'up':'flat'}">${i+1}</span><span class="r">${esc(p.name||'无名氏')} · 种子 ${esc(p.seed)}</span><span class="v ${cls(p.ret)}">${sgn(p.ret)}${fmt(p.ret)}%</span></div>`;
      }).join('');
    }
  }

  function gradeInfo(rank){
    return [null,
      {t:'上上签',c:'var(--red)'},
      {t:'上签',c:'var(--red)'},
      {t:'中签',c:'var(--gold-ink)'},
      {t:'下签',c:'var(--green)'},
      {t:'下下签',c:'var(--green)'}
    ][rank]||{t:'—',c:'var(--muted)'};
  }
  function renderVerdict(){
    const drift=ticks>0?logSum/ticks*100:0;
    const dv=$('vDrift');dv.textContent=sgn(drift)+fmt(drift,3)+'%';dv.className='val '+cls(drift);
    const board=standings(),rank=board.findIndex(b=>b.id==='you')+1;
    $('vRank').textContent='#'+rank;$('vRank').className='val '+(rank<=2?'up':rank>=4?'down':'flat');
    const monkey=accts.find(a=>a.id==='monkey'),diff=retPct(human)-retPct(monkey);
    const mv=$('vMonkey');mv.textContent=sgn(diff)+fmt(diff)+'%';mv.className='val '+cls(diff);

    const grade=$('vGrade'), rul=$('vRuling'), n=human.tradeRets.length;
    if(phase==='ready'){
      grade.textContent='待抽'; grade.style.color='var(--muted)';
      rul.innerHTML='点「开始」。价格是零漂移的随机游走——里面<b>没有信号</b>。你会和 4 位对手在<span class="n">同一条行情</span>上同场竞技,看名次能不能稳定压过纯运气。';
      return;
    }
    const gi=gradeInfo(rank); grade.textContent=gi.t; grade.style.color=gi.c;
    if(phase==='done'){
      let txt;
      if(rank===1) txt=`这一局你<b>拔了头筹</b>——赢了动量、反转、买入持有,还有那只猴子。但零漂移的行情里,冠军只是一次运气好的抽签,不是本事。多抽几签,右边的平均名次会慢慢向 <span class="n">3.0 / 5</span> 归位。`;
      else if(diff<0) txt=`你排 <b>第 ${rank}</b>,还输给了那只抛硬币的猴子 ${fmt(-diff)}%。名头唬人的动量、反转,也一样贴着 0——因为根本没有信号可读。`;
      else txt=`你排 <b>第 ${rank} / 5</b>。多抽十几签,看右边的平均名次:它会收在 3 附近,说明名次和抛硬币没两样。`;
      if(human.fees>Math.abs(human.real+human.pos*(price-human.avg))*0.5 && retPct(human)<0)
        txt=`你出手 ${n} 次,交了 <b>${money(human.fees)}</b> 的过路费。零漂移市场本是零和,加上成本就成了<b>负和</b>——手越勤,输得越稳。`;
      rul.innerHTML=txt; return;
    }
    if(n<3) rul.innerHTML='用 <b>B / S</b> 一键翻多翻空。右边盯着你和对手的实时名次。';
    else{const mean=human.tradeRets.reduce((a,b)=>a+b,0)/n;rul.innerHTML=`已出手 ${n} 次,每笔均值 <b>${money(mean)}</b>。撑到收盘再看签——在零漂移里,这个数会往 0 塌。`;}
  }
  function renderAll(){draw();renderHUD();renderLead();renderVerdict();}

  // ---------- result / upload ----------
  function showResultBar(){
    const r=lastResult; if(!r)return;
    const gi=gradeInfo(r.rank);
    $('rbInfo').innerHTML=`<span style="color:${gi.c};font-weight:800">${gi.t}</span><span class="big ${cls(r.ret)}">${sgn(r.ret)}${fmt(r.ret)}%</span><span>名次 <b class="${r.rank<=2?'up':r.rank>=4?'down':'flat'}">#${r.rank}/${r.n}</b></span><span>种子 ${esc(r.seed)}</span>`;
    const up=$('bUpload');

    up.textContent='上榜 🏆';
    $('rbHint').textContent=r.qualifies?'':'只有跑赢全部对手(名次 #1)的成绩才有资格上榜。';
    $('resultBar').hidden=false;

  let uploadBusy=false;
  async function doUpload(){
    const r=lastResult; if(uploadBusy||!r||!r.qualifies)return;
    uploadBusy=true;
    const up=$('bUpload');
    up.disabled=true; up.textContent='上传中...'; $('rbHint').textContent='正在写入全网江湖榜...';

      const raw=await sget(K_PLAYERS,true); try{list=raw?JSON.parse(raw):[];}catch(e){list=[];}
      list=cleanPlayers(list);
      list.push({name,ret:r.ret,seed:r.seed,rank:r.rank,ts:r.ts});

    g.textAlign='left';
    // footer
    g.fillStyle='#4A3B29';g.font='600 24px "Bricolage Grotesque",sans-serif';
    g.fillText(r.rank===1?'赢了动量 · 反转 · 买入持有 · 和一只抛硬币的猴子':'没有信号的市场里,名次就是抛硬币',74,632);
    g.fillStyle='#8A7659';g.font='500 17px "Spline Sans Mono",monospace';
    g.fillText('种子 '+(r.seed||seedStr)+'   波动 '+(sigma*100).toFixed(1)+'%   '+roundLen+' 拍   @shengmm81 / Ignis',74,666);
    return c;
  }
  function roundRect(g,x,y,w,h,r){g.beginPath();g.moveTo(x+r,y);g.arcTo(x+w,y,x+w,y+h,r);g.arcTo(x+w,y+h,x,y+h,r);g.arcTo(x,y+h,x,y,r);g.arcTo(x,y,x+w,y,r);g.closePath();}
  function openShare(){drawShareCard();$('overlay').hidden=false;}
  function downloadPng(){try{const url=$('shareCanvas').toDataURL('image/png');const a=document.createElement('a');a.href=url;a.download='噪-'+(lastResult?lastResult.seed:'')+'.png';document.body.appendChild(a);a.click();a.remove();toast('图片已保存');}catch(e){toast('保存失败,可右键图片另存');}}
  function shareText(){
    const r=lastResult||{ret:0,rank:5,n:5,seed:seedStr};const gi=[null,'上上签','上签','中签','下签','下下签'][r.rank]||'';
    return `我在「纯随机市场」抽了个${gi}:种子 ${r.seed},${sgn(r.ret)}${fmt(r.ret)}%,第 ${r.rank}/${r.n} 名。`+
      (r.rank===1?'这局赢了动量、反转、买入持有和一只抛硬币的猴子——但零漂移里的第一名只是运气。':'没有信号的市场里,名次就是抛硬币。')+
      ' 敢来对账吗? #对账 #预测市场';
  }
  function copyText(){const t=shareText();if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(()=>toast('文案已复制')).catch(()=>fallbackCopy(t));}else fallbackCopy(t);}
  function fallbackCopy(t){const ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast('文案已复制');}catch(e){toast('复制失败,请手动选择');}ta.remove();}
  let toastT=null;
  function toast(msg){const el=$('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),1900);}

  // ---------- loop ----------
  function frame(ts){
    if(phase==='running'){
      if(!lastT)lastT=ts; acc+=ts-lastT; lastT=ts;
      const interval=Math.round(680*Math.pow(0.79,speed-1));
      let did=false; while(acc>=interval&&phase==='running'){tick();acc-=interval;did=true;}
      if(did)renderAll();
    }else lastT=0;
    requestAnimationFrame(frame);
  }

  // ---------- controls ----------
  function setLong(on){$('bLong').classList.toggle('on',on);}
  function setShort(on){$('bShort').classList.toggle('on',on);}
  function refreshTradeBtns(){setLong(human.pos>0);setShort(human.pos<0);}
  function doLong(){if(!appReady)return;if(phase==='ready')startRun();if(phase!=='done'){target(human,1,size);refreshTradeBtns();renderAll();}}
  function doShort(){if(!appReady)return;if(phase==='ready')startRun();if(phase!=='done'){target(human,-1,size);refreshTradeBtns();renderAll();}}
  function doFlat(){if(!appReady)return;if(phase!=='done'){if(human.pos!==0)exec(human,-Math.sign(human.pos),Math.abs(human.pos));refreshTradeBtns();renderAll();}}
  function setPrimary(){const b=$('bPrimary');b.classList.toggle('run',phase==='running');
    b.textContent=phase==='ready'?'开始 ▶':phase==='running'?'暂停 ⏸':phase==='paused'?'继续 ▶':'再来一局 ↻';}
  function startRun(){if(!appReady)return;phase='running';lastT=0;setPrimary();}
  function primaryClick(){if(!appReady)return;if(phase==='ready')startRun();else if(phase==='running'){phase='paused';setPrimary();renderAll();}else if(phase==='paused')startRun();else newRound();}
  function setSize(v){size=Math.min(50,Math.max(1,v));$('szVal').textContent=size;}
  function switchTab(t){boardTab=t;$('tabMine').classList.toggle('active',t==='mine');$('tabPlayers').classList.toggle('active',t==='players');renderBoard();}

  $('bPrimary').onclick=primaryClick;
  $('bLong').onclick=doLong; $('bShort').onclick=doShort; $('bFlat').onclick=doFlat;
  $('szUp').onclick=()=>setSize(size+1); $('szDown').onclick=()=>setSize(size-1);
  $('tSpeed').oninput=e=>{speed=+e.target.value;$('svVal').textContent=speed;};
  $('tabMine').onclick=()=>switchTab('mine'); $('tabPlayers').onclick=()=>switchTab('players');
  $('bClear').onclick=async()=>{
    if(boardTab==='mine'){mine=[];await sset(K_MINE,'[]',false);}
    else if(ENV==='online'){toast('全网江湖榜不能在前端清空');return;}
    else{players=[];await sset(K_PLAYERS,'[]',true);}
    renderBoard();
  };
  $('bUpload').onclick=doUpload; $('bShare').onclick=openShare;
  $('dlPng').onclick=downloadPng; $('copyTxt').onclick=copyText;
  $('closeShare').onclick=()=>{$('overlay').hidden=true;};
  $('overlay').onclick=e=>{if(e.target===$('overlay'))$('overlay').hidden=true;};
  ['cfgSeed','cfgSigma','cfgCost','cfgLen'].forEach(id=>$(id).addEventListener('change',()=>{roundNo=0;loadRound();}));
  document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT')return;
    const k=e.key.toLowerCase();
    if(k==='b')doLong();else if(k==='s')doShort();else if(k==='f')doFlat();
    else if(k==='escape')$('overlay').hidden=true;
    else if(e.code==='Space'){e.preventDefault();primaryClick();}
  });
  window.addEventListener('resize',sizeCanvas);

  async function init(){
    try{const rn=await sget(K_NAME,false);if(rn)$('rbName').value=rn;}catch(e){}
    try{const rm=await sget(K_MINE,false);if(rm)mine=JSON.parse(rm)||[];}catch(e){mine=[];}
    try{const rp=await sget(K_PLAYERS,true);if(rp)players=cleanPlayers(JSON.parse(rp)||[]);}catch(e){players=[];}
    loadRound(); sizeCanvas(); renderBoard();
    appReady=true; $('bPrimary').disabled=false;
    requestAnimationFrame(frame);
    const gp=await fetchGlobalPlayers();
    if(gp){players=gp;renderBoard();}
    else renderBoard();
  }
  init();
})();
</script>
</body>
</html>
